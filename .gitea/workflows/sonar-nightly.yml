name: SonarQube Analysis (auto)

# Gitea 1.22 compatible Sonar workflow:
# - minimal trigger schema
# - no advanced input typing
# - concurrency enabled to avoid overlap
# - mirror-safe schedule

# Runs only AFTER "VIRIDA CI - Main Pipeline" completes on main/master.
# Kept the nightly schedule + workflow_dispatch as safety nets for
# mirror-mode delays or manual re-runs.
on:
  workflow_run:
    workflows: [ "VIRIDA CI - Main Pipeline" ]
    types: [ completed ]
    branches: [ main, master ]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: sonar-nightly-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.19.0'
  VIRIDA_API_REF: ${{ secrets.VIRIDA_API_REF || 'main' }}
  VIRIDA_APP_REF: ${{ secrets.VIRIDA_APP_REF || 'main' }}
  VIRIDA_MARKETPLACE_API_REF: ${{ secrets.VIRIDA_MARKETPLACE_API_REF || 'main' }}
  VIRIDA_MARKETPLACE_APP_REF: ${{ secrets.VIRIDA_MARKETPLACE_APP_REF || 'main' }}
  VIRIDA_EVE_REF: ${{ secrets.VIRIDA_EVE_REF || 'main' }}
  # Immutable external refs are enforced by default on main.
  ALLOW_MOVING_EXTERNAL_REFS: ${{ secrets.ALLOW_MOVING_EXTERNAL_REFS || 'false' }}
  SONAR_SCANNER_VERSION: '8.0.1.6346'
  SONAR_SCANNER_DIR: '/tmp/sonar-scanner'

jobs:
  sonarqube:
    runs-on: virida-host
    name: SonarQube Analysis
    timeout-minutes: 45

    steps:
    - name: Validate required secrets
      run: |
        set -euo pipefail
        if [ -z "${{ secrets.GITEA }}" ]; then
          echo "::error::Missing secret GITEA"
          exit 1
        fi
        if [ -z "${{ secrets.SONAR_TOKEN }}" ] || [ -z "${{ secrets.SONAR_HOST_URL }}" ]; then
          echo "::error::Missing SONAR_TOKEN and/or SONAR_HOST_URL"
          exit 1
        fi
        if [ -z "${{ secrets.GH_TOKEN_MARKETPLACE }}" ]; then
          echo "::error::Missing secret GH_TOKEN_MARKETPLACE for private marketplace repositories"
          exit 1
        fi

    - name: Check external refs (advisory)
      run: |
        set -euo pipefail
        if [ "${GITHUB_REF_NAME:-}" != "main" ] && [ "${GITHUB_REF_NAME:-}" != "master" ]; then
          echo "[INFO] Not main/master branch; ref check skipped."
          exit 0
        fi
        HAS_MOVING_REF=false
        for ref in "${VIRIDA_API_REF}" "${VIRIDA_APP_REF}" "${VIRIDA_MARKETPLACE_API_REF}" "${VIRIDA_MARKETPLACE_APP_REF}" "${VIRIDA_EVE_REF}"; do
          if printf '%s' "$ref" | grep -Eq '^(main|master|develop|dev)$'; then
            echo "::warning::External ref pointing to moving branch: $ref (recommend using immutable tag/SHA)"
            HAS_MOVING_REF=true
          fi
        done
        if [ "$HAS_MOVING_REF" = "false" ]; then
          echo "[OK] All external refs are immutable (tags/SHA)."
        else
          echo "::warning::Some refs are moving branches. CI will continue but builds may not be reproducible."
        fi

    - name: Checkout devops repo
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        token: ${{ secrets.GITEA }}
        submodules: false

    - name: Checkout virida_api
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: Virida/virida_api
        ref: ${{ env.VIRIDA_API_REF }}
        path: virida_api
        token: ${{ secrets.GITEA }}

    - name: Checkout virida_app
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: Virida/virida_app
        ref: ${{ env.VIRIDA_APP_REF }}
        path: virida_app
        token: ${{ secrets.GITEA }}

    - name: Checkout Virida_marketplace_api
      env:
        GH_TOKEN_MARKETPLACE: ${{ secrets.GH_TOKEN_MARKETPLACE }}
        REQUESTED_REF: ${{ env.VIRIDA_MARKETPLACE_API_REF }}
      run: |
        set -euo pipefail
        REPO_URL="https://x-access-token:${GH_TOKEN_MARKETPLACE}@github.com/Virida-ghouse/Virida_marketplace_api.git"
        TARGET_DIR="Virida_marketplace_api"
        if [ -z "${REQUESTED_REF:-}" ]; then
          REQUESTED_REF="main"
        fi
        RESOLVED_REF="${REQUESTED_REF}"
        if ! git ls-remote --exit-code --heads "${REPO_URL}" "${REQUESTED_REF}" >/dev/null 2>&1 \
          && ! git ls-remote --exit-code --tags "${REPO_URL}" "${REQUESTED_REF}" >/dev/null 2>&1; then
          echo "::warning::Requested ref '${REQUESTED_REF}' not found on Virida_marketplace_api. Trying fallback branch main."
          if git ls-remote --exit-code --heads "${REPO_URL}" "main" >/dev/null 2>&1; then
            RESOLVED_REF="main"
          else
            echo "::error::No usable ref found (requested='${REQUESTED_REF}', fallback='main')."
            exit 1
          fi
        fi
        echo "[INFO] Cloning Virida_marketplace_api ref: ${RESOLVED_REF}"
        rm -rf "${TARGET_DIR}"
        git clone --depth 1 --branch "${RESOLVED_REF}" "${REPO_URL}" "${TARGET_DIR}"
        git -C "${TARGET_DIR}" remote set-url origin "https://github.com/Virida-ghouse/Virida_marketplace_api.git"

    - name: Checkout Virida_marketplace_app
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: Virida-ghouse/Virida_marketplace_app
        ref: ${{ env.VIRIDA_MARKETPLACE_APP_REF }}
        github-server-url: https://github.com
        path: Virida_marketplace_app
        token: ${{ secrets.GH_TOKEN_MARKETPLACE }}

    - name: Checkout virida-eve
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: Virida/virida-eve
        ref: ${{ env.VIRIDA_EVE_REF }}
        path: virida-eve
        token: ${{ secrets.GITEA }}

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        cache-dependency-path: |
          virida_api/package-lock.json
          virida_app/package-lock.json
          Virida_marketplace_api/package-lock.json
          Virida_marketplace_app/package-lock.json
          virida-eve/package-lock.json

    - name: Cache SonarScanner CLI
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ${{ env.SONAR_SCANNER_DIR }}
        key: sonar-scanner-${{ env.SONAR_SCANNER_VERSION }}

    - name: Install backend deps + coverage
      working-directory: virida_api
      env:
        NODE_OPTIONS: --no-warnings
      run: |
        set -euo pipefail
        npm ci --include=dev
        export DATABASE_URL="postgresql://user:pass@localhost:5432/virida?schema=public"
        npx prisma generate
        npm test -- --ci --runInBand --coverage

    - name: Install frontend deps + tests
      working-directory: virida_app
      env:
        NODE_OPTIONS: --no-warnings
        CI: 'true'
      run: |
        set -euo pipefail
        npm ci --include=dev --ignore-scripts
        COVERAGE_SCRIPT="$(node -e "const s=require('./package.json').scripts||{}; const c=['test:coverage','coverage','test:ci']; console.log(c.find(k=>s[k])||'')")"
        HAS_TEST_SCRIPT="$(node -e "const s=require('./package.json').scripts||{}; process.stdout.write(s.test ? 'yes' : 'no')")"
        TEST_SCRIPT_VALUE="$(node -e "const s=require('./package.json').scripts||{}; process.stdout.write(String(s.test||''))")"
        if [ -n "${COVERAGE_SCRIPT}" ]; then
          echo "[INFO] Running ${COVERAGE_SCRIPT} for virida_app"
          npm run -s "${COVERAGE_SCRIPT}"
          echo "[OK] Frontend coverage generated"
        elif printf '%s' "${TEST_SCRIPT_VALUE}" | grep -qi 'no test specified'; then
          echo "::warning::Placeholder npm test script detected in virida_app; skipping tests"
        elif [ "${HAS_TEST_SCRIPT}" = "yes" ]; then
          echo "[INFO] Running npm test for virida_app"
          npm test -- --ci --runInBand --coverage
          echo "[OK] Frontend test coverage generated via npm test"
        else
          echo "::warning::No test script found in virida_app/package.json"
        fi

    - name: Install Virida_marketplace_api deps + tests
      working-directory: Virida_marketplace_api
      env:
        NODE_OPTIONS: --no-warnings
        CI: 'true'
      run: |
        set -euo pipefail
        npm ci --include=dev --ignore-scripts
        COVERAGE_SCRIPT="$(node -e "const s=require('./package.json').scripts||{}; const c=['test:coverage','coverage','test:ci']; console.log(c.find(k=>s[k])||'')")"
        HAS_TEST_SCRIPT="$(node -e "const s=require('./package.json').scripts||{}; process.stdout.write(s.test ? 'yes' : 'no')")"
        TEST_SCRIPT_VALUE="$(node -e "const s=require('./package.json').scripts||{}; process.stdout.write(String(s.test||''))")"
        if [ -n "${COVERAGE_SCRIPT}" ]; then
          echo "[INFO] Running ${COVERAGE_SCRIPT} for Virida_marketplace_api"
          npm run -s "${COVERAGE_SCRIPT}"
        elif printf '%s' "${TEST_SCRIPT_VALUE}" | grep -qi 'no test specified'; then
          echo "::warning::Placeholder npm test script detected in Virida_marketplace_api; skipping tests"
        elif [ "${HAS_TEST_SCRIPT}" = "yes" ]; then
          echo "[INFO] Running npm test for Virida_marketplace_api"
          npm test -- --ci --runInBand --coverage
        else
          echo "::warning::No test script found in Virida_marketplace_api/package.json"
        fi

    - name: Install Virida_marketplace_app deps + tests
      working-directory: Virida_marketplace_app
      env:
        NODE_OPTIONS: --no-warnings
        CI: 'true'
      run: |
        set -euo pipefail
        npm ci --include=dev --ignore-scripts
        COVERAGE_SCRIPT="$(node -e "const s=require('./package.json').scripts||{}; const c=['test:coverage','coverage','test:ci']; console.log(c.find(k=>s[k])||'')")"
        HAS_TEST_SCRIPT="$(node -e "const s=require('./package.json').scripts||{}; process.stdout.write(s.test ? 'yes' : 'no')")"
        TEST_SCRIPT_VALUE="$(node -e "const s=require('./package.json').scripts||{}; process.stdout.write(String(s.test||''))")"
        if [ -n "${COVERAGE_SCRIPT}" ]; then
          echo "[INFO] Running ${COVERAGE_SCRIPT} for Virida_marketplace_app"
          npm run -s "${COVERAGE_SCRIPT}"
        elif printf '%s' "${TEST_SCRIPT_VALUE}" | grep -qi 'no test specified'; then
          echo "::warning::Placeholder npm test script detected in Virida_marketplace_app; skipping tests"
        elif [ "${HAS_TEST_SCRIPT}" = "yes" ]; then
          echo "[INFO] Running npm test for Virida_marketplace_app"
          npm test -- --ci --runInBand --coverage
        else
          echo "::warning::No test script found in Virida_marketplace_app/package.json"
        fi

    - name: Install virida-eve deps + tests (best effort)
      working-directory: virida-eve
      env:
        NODE_OPTIONS: --no-warnings
        CI: 'true'
      run: |
        set -euo pipefail
        if [ ! -f package.json ]; then
          echo "[INFO] virida-eve has no package.json; skipping npm tests"
          exit 0
        fi
        if [ -f package-lock.json ]; then
          npm ci --include=dev --ignore-scripts
        else
          npm install --ignore-scripts
        fi
        COVERAGE_SCRIPT="$(node -e "const s=require('./package.json').scripts||{}; const c=['test:coverage','coverage','test:ci']; console.log(c.find(k=>s[k])||'')")"
        HAS_TEST_SCRIPT="$(node -e "const s=require('./package.json').scripts||{}; process.stdout.write(s.test ? 'yes' : 'no')")"
        TEST_SCRIPT_VALUE="$(node -e "const s=require('./package.json').scripts||{}; process.stdout.write(String(s.test||''))")"
        if [ -n "${COVERAGE_SCRIPT}" ]; then
          echo "[INFO] Running ${COVERAGE_SCRIPT} for virida-eve"
          npm run -s "${COVERAGE_SCRIPT}"
        elif printf '%s' "${TEST_SCRIPT_VALUE}" | grep -qi 'no test specified'; then
          echo "::warning::Placeholder npm test script detected in virida-eve; skipping tests"
        elif [ "${HAS_TEST_SCRIPT}" = "yes" ]; then
          echo "[INFO] Running npm test for virida-eve"
          npm test -- --ci --runInBand --coverage
        else
          echo "::warning::No test script found in virida-eve/package.json"
        fi

    - name: Install SonarScanner CLI
      run: |
        set -euo pipefail
        if [ -x "${SONAR_SCANNER_DIR}/bin/sonar-scanner" ]; then
          echo "[OK] SonarScanner restored from cache"
          "${SONAR_SCANNER_DIR}/bin/sonar-scanner" --version
          exit 0
        fi
        URL="https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SONAR_SCANNER_VERSION}-linux-x64.zip"
        curl -fsSLo /tmp/sonar-scanner.zip "${URL}"
        curl -fsSLo /tmp/sonar-scanner.zip.sha256 "${URL}.sha256"
        EXPECTED_SHA="$(awk '{print $1}' /tmp/sonar-scanner.zip.sha256)"
        ACTUAL_SHA="$(shasum -a 256 /tmp/sonar-scanner.zip | awk '{print $1}')"
        if [ -z "${EXPECTED_SHA}" ] || [ "${EXPECTED_SHA}" != "${ACTUAL_SHA}" ]; then
          echo "::error::SonarScanner SHA256 mismatch"
          exit 1
        fi
        rm -rf "${SONAR_SCANNER_DIR}" "/tmp/sonar-scanner-${SONAR_SCANNER_VERSION}-linux-x64"
        unzip -q /tmp/sonar-scanner.zip -d /tmp
        mv "/tmp/sonar-scanner-${SONAR_SCANNER_VERSION}-linux-x64" "${SONAR_SCANNER_DIR}"
        "${SONAR_SCANNER_DIR}/bin/sonar-scanner" --version

    - name: Sonar scan virida_api
      working-directory: virida_api
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        # Keep scanner + JS bridge memory below container limits on Gitea runner.
        SONAR_SCANNER_OPTS: '-Xmx512m -Xms128m'
        SONAR_SCANNER_JAVA_OPTS: '-Xmx512m -Xms128m'
      run: |
        set -euo pipefail
        SONAR_TOKEN_CLEAN="$(printf '%s' "${SONAR_TOKEN}" | tr -d '\r\n')"
        SONAR_HOST_URL_CLEAN="$(printf '%s' "${SONAR_HOST_URL}" | tr -d '\r\n' | sed -E 's#(https?://[^/]+).*#\1#')"
        if [ -z "${SONAR_TOKEN_CLEAN}" ]; then
          echo "::error::SONAR_TOKEN empty after trim"
          exit 1
        fi
        "${SONAR_SCANNER_DIR}/bin/sonar-scanner" \
          -Dsonar.host.url="${SONAR_HOST_URL_CLEAN}" \
          -Dsonar.token="${SONAR_TOKEN_CLEAN}" \
          -Dsonar.projectKey=virida_api \
          -Dsonar.projectName=virida_api \
          -Dsonar.sources=src \
          -Dsonar.tests=tests \
          -Dsonar.test.inclusions=tests/**/* \
          -Dsonar.exclusions='node_modules/**,dist/**,build/**,coverage/**,**/*.min.js,**/*.bundle.js,prisma/migrations/**,**/*.generated.*' \
          -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info \
          -Dsonar.javascript.node.maxspace=512 \
          -Dsonar.scm.disabled=true \
          -Dsonar.sourceEncoding=UTF-8 \
          -Dsonar.scanner.skipJreProvisioning=true

    - name: Sonar scan virida_app
      working-directory: virida_app
      timeout-minutes: 20
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        # Keep memory below container limit (~1.5 GB) to avoid SIGTERM.
        SONAR_SCANNER_OPTS: '-Xmx768m -Xms256m'
        SONAR_SCANNER_JAVA_OPTS: '-Xmx768m -Xms256m'
      run: |
        set -euo pipefail
        SONAR_TOKEN_CLEAN="$(printf '%s' "${SONAR_TOKEN}" | tr -d '\r\n')"
        SONAR_HOST_URL_CLEAN="$(printf '%s' "${SONAR_HOST_URL}" | tr -d '\r\n' | sed -E 's#(https?://[^/]+).*#\1#')"
        if [ -z "${SONAR_TOKEN_CLEAN}" ]; then
          echo "::error::SONAR_TOKEN empty after trim"
          exit 1
        fi
        SCAN_SOURCES="."
        if [ -d "src" ]; then
          SCAN_SOURCES="src"
        fi
        echo "[INFO] virida_app sonar.sources=${SCAN_SOURCES}"
        SCAN_ARGS=(
          -Dsonar.host.url="${SONAR_HOST_URL_CLEAN}"
          -Dsonar.token="${SONAR_TOKEN_CLEAN}"
          -Dsonar.projectKey=virida_app
          -Dsonar.projectName=virida_app
          -Dsonar.sources="${SCAN_SOURCES}"
          -Dsonar.tests=src
          -Dsonar.test.inclusions='**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx'
          -Dsonar.exclusions='dist/**,public/**,node_modules/**,coverage/**,**/*.d.ts,**/*.min.js,**/*.bundle.js,**/*.generated.*,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,src/main.tsx,src/vite-env.d.ts'
          -Dsonar.coverage.exclusions='src/main.tsx,src/vite-env.d.ts'
          -Dsonar.javascript.node.maxspace=1024
          -Dsonar.scm.disabled=true
          -Dsonar.sourceEncoding=UTF-8
          -Dsonar.scanner.skipJreProvisioning=true
        )
        if [ -s coverage/lcov.info ]; then
          echo "[INFO] Using virida_app coverage report coverage/lcov.info"
          SCAN_ARGS+=(-Dsonar.javascript.lcov.reportPaths=coverage/lcov.info)
        else
          echo "::warning::Missing or empty coverage/lcov.info for virida_app; running Sonar scan without JS coverage report."
        fi
        "${SONAR_SCANNER_DIR}/bin/sonar-scanner" "${SCAN_ARGS[@]}"

    - name: Sonar scan Virida_marketplace_api
      working-directory: Virida_marketplace_api
      timeout-minutes: 20
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_SCANNER_OPTS: '-Xmx768m -Xms256m'
        SONAR_SCANNER_JAVA_OPTS: '-Xmx768m -Xms256m'
      run: |
        set -euo pipefail
        SONAR_TOKEN_CLEAN="$(printf '%s' "${SONAR_TOKEN}" | tr -d '\r\n')"
        SONAR_HOST_URL_CLEAN="$(printf '%s' "${SONAR_HOST_URL}" | tr -d '\r\n' | sed -E 's#(https?://[^/]+).*#\1#')"
        if [ -z "${SONAR_TOKEN_CLEAN}" ]; then
          echo "::error::SONAR_TOKEN empty after trim"
          exit 1
        fi
        SCAN_ARGS=(
          -Dsonar.host.url="${SONAR_HOST_URL_CLEAN}"
          -Dsonar.token="${SONAR_TOKEN_CLEAN}"
          -Dsonar.projectKey=Virida_marketplace_api
          -Dsonar.projectName=Virida_marketplace_api
          -Dsonar.sources=src
          -Dsonar.tests=.
          -Dsonar.test.inclusions='**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,tests/**/*'
          -Dsonar.exclusions='node_modules/**,dist/**,build/**,coverage/**,**/*.min.js,**/*.bundle.js,**/*.generated.*,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,tests/**'
          -Dsonar.javascript.node.maxspace=1024
          -Dsonar.scm.disabled=true
          -Dsonar.sourceEncoding=UTF-8
          -Dsonar.scanner.skipJreProvisioning=true
        )
        if [ -f coverage/lcov.info ]; then
          SCAN_ARGS+=(-Dsonar.javascript.lcov.reportPaths=coverage/lcov.info)
        fi
        "${SONAR_SCANNER_DIR}/bin/sonar-scanner" "${SCAN_ARGS[@]}"

    - name: Sonar scan Virida_marketplace_app
      working-directory: Virida_marketplace_app
      timeout-minutes: 20
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_SCANNER_OPTS: '-Xmx768m -Xms256m'
        SONAR_SCANNER_JAVA_OPTS: '-Xmx768m -Xms256m'
      run: |
        set -euo pipefail
        SONAR_TOKEN_CLEAN="$(printf '%s' "${SONAR_TOKEN}" | tr -d '\r\n')"
        SONAR_HOST_URL_CLEAN="$(printf '%s' "${SONAR_HOST_URL}" | tr -d '\r\n' | sed -E 's#(https?://[^/]+).*#\1#')"
        if [ -z "${SONAR_TOKEN_CLEAN}" ]; then
          echo "::error::SONAR_TOKEN empty after trim"
          exit 1
        fi
        SCAN_ARGS=(
          -Dsonar.host.url="${SONAR_HOST_URL_CLEAN}"
          -Dsonar.token="${SONAR_TOKEN_CLEAN}"
          -Dsonar.projectKey=Virida_marketplace_app
          -Dsonar.projectName=Virida_marketplace_app
          -Dsonar.sources=.
          -Dsonar.exclusions='node_modules/**,dist/**,build/**,coverage/**,**/*.min.js,**/*.bundle.js,**/*.generated.*'
          -Dsonar.javascript.node.maxspace=1024
          -Dsonar.scm.disabled=true
          -Dsonar.sourceEncoding=UTF-8
          -Dsonar.scanner.skipJreProvisioning=true
        )
        if [ -f coverage/lcov.info ]; then
          SCAN_ARGS+=(-Dsonar.javascript.lcov.reportPaths=coverage/lcov.info)
        fi
        "${SONAR_SCANNER_DIR}/bin/sonar-scanner" "${SCAN_ARGS[@]}"

    - name: Sonar scan virida-eve
      working-directory: virida-eve
      timeout-minutes: 20
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_SCANNER_OPTS: '-Xmx768m -Xms256m'
        SONAR_SCANNER_JAVA_OPTS: '-Xmx768m -Xms256m'
      run: |
        set -euo pipefail
        SONAR_TOKEN_CLEAN="$(printf '%s' "${SONAR_TOKEN}" | tr -d '\r\n')"
        SONAR_HOST_URL_CLEAN="$(printf '%s' "${SONAR_HOST_URL}" | tr -d '\r\n' | sed -E 's#(https?://[^/]+).*#\1#')"
        if [ -z "${SONAR_TOKEN_CLEAN}" ]; then
          echo "::error::SONAR_TOKEN empty after trim"
          exit 1
        fi
        SCAN_ARGS=(
          -Dsonar.host.url="${SONAR_HOST_URL_CLEAN}"
          -Dsonar.token="${SONAR_TOKEN_CLEAN}"
          -Dsonar.projectKey=virida-eve
          -Dsonar.projectName=virida-eve
          -Dsonar.sources=.
          -Dsonar.exclusions='node_modules/**,dist/**,build/**,coverage/**,**/*.min.js,**/*.bundle.js,**/*.generated.*,**/*.png,**/*.jpg,**/*.jpeg,**/*.gif,**/*.webp'
          -Dsonar.javascript.node.maxspace=1024
          -Dsonar.scm.disabled=true
          -Dsonar.sourceEncoding=UTF-8
          -Dsonar.scanner.skipJreProvisioning=true
        )
        if [ -f coverage/lcov.info ]; then
          SCAN_ARGS+=(-Dsonar.javascript.lcov.reportPaths=coverage/lcov.info)
        fi
        "${SONAR_SCANNER_DIR}/bin/sonar-scanner" "${SCAN_ARGS[@]}"

    - name: Summary
      if: always()
      run: |
        echo "========================================"
        echo "  SonarQube scan finished"
        echo "========================================"
        echo "Results: ${{ secrets.SONAR_HOST_URL }}"

    - name: Verify SonarQube quality gates (non-blocking)
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        # Non-blocking mode: Sonar gate failures emit warnings, not errors.
        # Set SONAR_GATE_ENFORCE=true in this file (not via secret) to re-enable blocking.
        SONAR_GATE_ENFORCE: 'false'
      run: |
        set -euo pipefail
        SONAR_TOKEN_CLEAN="$(printf '%s' "${SONAR_TOKEN}" | tr -d '\r\n')"
        SONAR_HOST_URL_CLEAN="$(printf '%s' "${SONAR_HOST_URL}" | tr -d '\r\n' | sed -E 's#(https?://[^/]+).*#\1#')"
        if [ -z "${SONAR_TOKEN_CLEAN}" ]; then
          echo "::error::SONAR_TOKEN empty after trim"
          exit 1
        fi
        check_gate() {
          local key="$1"
          local resp
          local status
          local endpoint="${SONAR_HOST_URL_CLEAN}/api/qualitygates/project_status?projectKey=${key}"
          local body_file
          local http_code
          body_file="$(mktemp)"
          http_code="$(curl -sS -o "${body_file}" -w "%{http_code}" \
            -H "Authorization: Bearer ${SONAR_TOKEN_CLEAN}" \
            "${endpoint}")"
          if [ "${http_code}" = "401" ] || [ "${http_code}" = "403" ]; then
            http_code="$(curl -sS -o "${body_file}" -w "%{http_code}" \
              -u "${SONAR_TOKEN_CLEAN}:" \
              "${endpoint}")"
          fi
          if [ "${http_code}" != "200" ]; then
            if [ "${SONAR_GATE_ENFORCE}" = "true" ]; then
              echo "::error::Unable to read Sonar quality gate for ${key} (HTTP ${http_code})."
            else
              echo "::warning::Unable to read Sonar quality gate for ${key} (HTTP ${http_code}) in non-blocking mode."
            fi
            if [ "${http_code}" = "401" ] || [ "${http_code}" = "403" ]; then
              echo "::error::SONAR_TOKEN is valid for scan upload only, or lacks read access on '${key}'."
              echo "::error::Required Sonar permissions: Execute Analysis + Browse (or project admin) on each project."
            fi
            echo "[DEBUG] endpoint=${endpoint}"
            sed -n '1,120p' "${body_file}"
            rm -f "${body_file}"
            if [ "${SONAR_GATE_ENFORCE}" = "true" ]; then
              exit 1
            fi
            return 0
          fi
          resp="$(cat "${body_file}")"
          rm -f "${body_file}"
          status="$(echo "$resp" | python3 -c 'import json,sys; print(json.load(sys.stdin)["projectStatus"]["status"])')"
          echo "[INFO] ${key} quality gate: ${status}"
          if [ "${status}" != "OK" ]; then
            if [ "${SONAR_GATE_ENFORCE}" = "true" ]; then
              echo "::error::Sonar quality gate failed for ${key} (status=${status})."
              exit 1
            fi
            echo "::warning::Sonar quality gate failed for ${key} (status=${status}) - non-blocking mode enabled."
          fi
        }
        check_gate "virida_api"
        check_gate "virida_app"
        check_gate "Virida_marketplace_api"
        check_gate "Virida_marketplace_app"
        check_gate "virida-eve"

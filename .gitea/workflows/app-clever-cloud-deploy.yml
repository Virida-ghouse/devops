name: Deploy virida_app to Clever Cloud

# Deploy virida_app to a standard Clever Cloud app through git push.
# Auto trigger:
#   - push on main (for continuous delivery)
# Manual/safety:
#   - workflow_dispatch with dry_run, confirm_production and rollback_ref
# Drift correction:
#   - weekly schedule

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print plan but do not push'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      confirm_production:
        description: 'Explicit production approval (must be true to deploy manually)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      rollback_ref:
        description: 'Optional git ref/SHA to rollback to (deploy this ref instead of HEAD)'
        required: false
        default: ''
  schedule:
    - cron: '0 2 * * 1'

concurrency:
  group: app-clevercloud-deploy
  cancel-in-progress: false

env:
  VIRIDA_APP_REF: ${{ secrets.VIRIDA_APP_REF || 'main' }}

jobs:
  deploy:
    runs-on: virida-host
    name: Push virida_app to Clever Cloud
    environment: production
    timeout-minutes: 12
    if: ${{ secrets.GITEA != '' && secrets.CD_APP_ENABLED == 'true' }}

    steps:
    - name: Validate deploy secrets
      env:
        CLEVER_APP_GIT_URL: ${{ secrets.CLEVER_APP_GIT_URL }}
        CLEVER_APP_DEPLOY_REF: ${{ secrets.CLEVER_APP_DEPLOY_REF }}
      run: |
        set -euo pipefail
        if [ -z "${CLEVER_APP_GIT_URL:-}" ]; then
          echo "::error::Missing secret CLEVER_APP_GIT_URL (Clever Cloud git remote for virida_app)."
          exit 1
        fi
        if [ -z "${CLEVER_APP_DEPLOY_REF:-}" ]; then
          echo "::error::Missing secret CLEVER_APP_DEPLOY_REF (usually 'main')."
          exit 1
        fi
        echo "[OK] Deploy secrets present"

    - name: Explicit deploy approval gate for manual/scheduled runs
      env:
        EVENT_NAME: ${{ github.event_name }}
        CONFIRM_PRODUCTION: ${{ github.event.inputs.confirm_production || 'false' }}
        PROD_AUTO_APPROVED: ${{ secrets.PROD_AUTO_APPROVED || 'false' }}
      run: |
        set -euo pipefail
        if [ "${EVENT_NAME}" = "push" ]; then
          echo "[OK] Push on main: auto-deploy enabled."
          exit 0
        fi
        if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
          if [ "${CONFIRM_PRODUCTION}" != "true" ]; then
            echo "::error::Deployment blocked: set input confirm_production=true."
            exit 1
          fi
          echo "[OK] Manual production approval confirmed."
          exit 0
        fi
        if [ "${PROD_AUTO_APPROVED}" != "true" ]; then
          echo "::error::Scheduled deployment blocked: secret PROD_AUTO_APPROVED must be true."
          exit 1
        fi
        echo "[OK] Scheduled deployment explicitly allowed."

    - name: Checkout virida_app
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: Virida/virida_app
        ref: ${{ env.VIRIDA_APP_REF }}
        path: virida_app
        fetch-depth: 0
        token: ${{ secrets.GITEA }}

    - name: Push to Clever Cloud
      working-directory: virida_app
      env:
        CLEVER_APP_GIT_URL: ${{ secrets.CLEVER_APP_GIT_URL }}
        CLEVER_APP_DEPLOY_REF: ${{ secrets.CLEVER_APP_DEPLOY_REF }}
        DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        ROLLBACK_REF: ${{ github.event.inputs.rollback_ref || '' }}
      run: |
        set -euo pipefail
        case "${CLEVER_APP_DEPLOY_REF}" in
          main|release/*|hotfix/*) ;;
          *)
            echo "::error::Ref de deploiement non autorisee: ${CLEVER_APP_DEPLOY_REF}"
            echo "::error::Valeurs autorisees: main, release/*, hotfix/*"
            exit 1
            ;;
        esac

        PREV_REMOTE_SHA="$(git ls-remote "${CLEVER_APP_GIT_URL}" "refs/heads/${CLEVER_APP_DEPLOY_REF}" | awk '{print $1}')"
        if [ -n "${PREV_REMOTE_SHA:-}" ]; then
          echo "[INFO] Previous remote SHA on ${CLEVER_APP_DEPLOY_REF}: ${PREV_REMOTE_SHA}"
          echo "[INFO] Rollback command:"
          echo "       git push clevercloud ${PREV_REMOTE_SHA}:${CLEVER_APP_DEPLOY_REF}"
        fi

        SOURCE_REF="HEAD"
        if [ -n "${ROLLBACK_REF}" ]; then
          if ! git rev-parse --verify --quiet "${ROLLBACK_REF}^{commit}" >/dev/null; then
            echo "::error::rollback_ref not found or not a commit-ish: ${ROLLBACK_REF}"
            exit 1
          fi
          SOURCE_REF="${ROLLBACK_REF}"
          echo "[INFO] Rollback mode: deploying ${SOURCE_REF} to ${CLEVER_APP_DEPLOY_REF}"
        fi

        git remote remove clevercloud 2>/dev/null || true
        git remote add clevercloud "${CLEVER_APP_GIT_URL}"
        if [ "${DRY_RUN}" = "true" ]; then
          echo "[DRY RUN] would push ${SOURCE_REF} to clevercloud:${CLEVER_APP_DEPLOY_REF}"
          exit 0
        fi
        git push clevercloud "${SOURCE_REF}:${CLEVER_APP_DEPLOY_REF}"
        echo "[OK] Push done — check Clever Cloud Console for build progress."

name: VIRIDA CI - Main Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]
  # Mirror mode on Gitea does not emit push events for synced commits.
  # This schedule keeps CI automatic even when repo is a pull-mirror.
  # Mirror sync interval is 10 minutes on this repository.
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.19.0'
  GITLEAKS_VERSION: '8.24.3'
  VIRIDA_API_REF: ${{ secrets.VIRIDA_API_REF || 'main' }}
  VIRIDA_APP_REF: ${{ secrets.VIRIDA_APP_REF || 'main' }}
  VIRIDA_TOUCH_IHM_REF: ${{ secrets.VIRIDA_TOUCH_IHM_REF || 'main' }}
  VIRIDA_EVE_REF: ${{ secrets.VIRIDA_EVE_REF || 'main' }}
  LEAFNODE_REF: ${{ secrets.LEAFNODE_REF || 'main' }}
  # Immutable external refs are enforced by default on main.
  ALLOW_MOVING_EXTERNAL_REFS: ${{ secrets.ALLOW_MOVING_EXTERNAL_REFS || 'false' }}
  # SonarScanner CLI (no Docker) settings
  SONAR_SCANNER_VERSION: "8.0.1.6346"
  SONAR_SCANNER_DIR: "/tmp/sonar-scanner"

jobs:
  # ========================================
  # VALIDATION
  # ========================================
  validate:
    runs-on: virida-host
    name: Validate Code
    
    steps:
    - name: CI déclenchée
      run: |
        echo "🚀 CI lancée sur branche: ${{ github.ref_name }}"
        echo "📝 Commit: ${{ github.sha }}"
        echo "👤 Auteur: ${{ github.actor }}"

    - name: Runner preflight (blocking)
      run: |
        set -euo pipefail
        command -v node >/dev/null 2>&1 || { echo "::error::node missing"; exit 1; }
        command -v npm >/dev/null 2>&1 || { echo "::error::npm missing"; exit 1; }
        command -v python3 >/dev/null 2>&1 || { echo "::error::python3 missing"; exit 1; }
        NODE_MAJ="$(node -v | sed -E 's/^v([0-9]+).*/\1/')"
        if [ "${NODE_MAJ}" -lt 20 ]; then
          echo "::error::Node >= 20 required on runner."
          exit 1
        fi
        echo "[OK] Runner preflight passed"

    - name: Enforce immutable external refs on main
      run: |
        set -euo pipefail
        if [ "${GITHUB_REF_NAME:-}" != "main" ]; then
          echo "[INFO] Not main branch; immutable ref policy is advisory only."
          exit 0
        fi
        if [ "${ALLOW_MOVING_EXTERNAL_REFS}" = "true" ]; then
          echo "::warning::ALLOW_MOVING_EXTERNAL_REFS=true: transitional mode enabled, immutable refs are not enforced on main."
          echo "::warning::Set ALLOW_MOVING_EXTERNAL_REFS=false after migrating all VIRIDA_*_REF secrets to tags/SHA."
          exit 0
        fi
        for ref in "${VIRIDA_API_REF}" "${VIRIDA_APP_REF}" "${VIRIDA_TOUCH_IHM_REF}" "${VIRIDA_EVE_REF}" "${LEAFNODE_REF}"; do
          if printf '%s' "$ref" | grep -Eq '^(main|master|develop|dev)$'; then
            echo "::error::External refs must be immutable on main (tag or commit SHA), got branch ref: $ref"
            exit 1
          fi
        done
        echo "[OK] External refs are immutable on main."
    
    - &checkout_code_step
      name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        token: ${{ secrets.GITEA }}
        submodules: false

    - &checkout_virida_api_step
      name: Checkout virida_api
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: Virida/virida_api
        ref: ${{ env.VIRIDA_API_REF }}
        path: virida_api
        token: ${{ secrets.GITEA }}

    - &checkout_virida_app_step
      name: Checkout virida_app
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: Virida/virida_app
        ref: ${{ env.VIRIDA_APP_REF }}
        path: virida_app
        token: ${{ secrets.GITEA }}
      
    - name: Validate YAML files (strict parser)
      run: |
        set -euo pipefail
        echo "Validating YAML configuration files..."
        python3 - <<'PY'
        import glob
        import importlib
        import os
        import subprocess
        import sys
        def load_yaml_or_install():
            try:
                return importlib.import_module("yaml")
            except ModuleNotFoundError:
                print("::warning::PyYAML missing on runner, attempting runtime install via pip.")
                target_dir = "/tmp/virida-pyyaml"
                try:
                    subprocess.check_call([sys.executable, "-m", "pip", "install", "--target", target_dir, "PyYAML"])
                except Exception as exc:
                    print(f"::error::Unable to install PyYAML dynamically: {exc}")
                    print("::error::Pre-bake python3-yaml/PyYAML in the runner image.")
                    sys.exit(1)
                # Force import path to the explicit install target.
                if os.path.isdir(target_dir) and target_dir not in sys.path:
                    sys.path.insert(0, target_dir)
                importlib.invalidate_caches()
                return importlib.import_module("yaml")
        yaml = load_yaml_or_install()

        files = sorted(glob.glob(".gitea/workflows/*.yml"))
        if not files:
            print("[INFO] No workflow files to validate.")
            sys.exit(0)

        errors = 0
        for path in files:
            print(f"Validating {path}")
            try:
                with open(path, "r", encoding="utf-8") as fh:
                    data = yaml.safe_load(fh)
                if not isinstance(data, dict) or "name" not in data:
                    print(f"[ERROR] Invalid workflow: {path} (missing top-level 'name')")
                    errors += 1
                    continue
                print(f"[OK] {path} is valid")
            except Exception as exc:  # strict parsing errors
                print(f"[ERROR] YAML parse error in {path}: {exc}")
                errors += 1
        if errors:
            print(f"[ERROR] Found {errors} invalid workflow file(s)")
            sys.exit(1)
        print("[OK] All workflow YAML files are valid")
        PY
        
    - name: Validate JSON files
      run: |
        echo "Validating JSON configuration files..."
        find . -maxdepth 1 -name "*.json" -type f | while read file; do
          echo "Validating $file"
          python3 -m json.tool "$file" > /dev/null || { echo "[ERROR] Invalid JSON: $file"; exit 1; }
        done
        echo "[OK] All JSON files are valid"

  # ========================================
  # TESTS EVE (virida_eve - Python) [external repo]
  # ========================================
  test-eve:
    runs-on: virida-host
    name: Test EVE (virida_eve)
    needs: [validate]
    env:
      STRICT_EXTERNAL_CHECKS: ${{ secrets.STRICT_EXTERNAL_CHECKS || 'true' }}

    steps:
    - name: Checkout virida_eve
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: Virida/virida-eve
        ref: ${{ env.VIRIDA_EVE_REF }}
        path: virida_eve
        token: ${{ secrets.GITEA }}

    - name: Python syntax/compile checks
      working-directory: virida_eve
      run: |
        set -euo pipefail
        if command -v python3 >/dev/null 2>&1; then
          python3 -m compileall .
        else
          if [ "${STRICT_EXTERNAL_CHECKS}" = "true" ]; then
            echo "::error::python3 not available on runner; strict external checks enabled."
            exit 1
          fi
          echo "::warning::python3 not available on runner; skipping virida_eve checks."
        fi

    - name: Container sanity checks (compose + build)
      working-directory: virida_eve
      run: |
        set -euo pipefail
        if ! command -v docker >/dev/null 2>&1; then
          if [ "${STRICT_EXTERNAL_CHECKS}" = "true" ]; then
            echo "::error::docker/podman not available on runner; strict external checks enabled."
            exit 1
          fi
          echo "::warning::docker/podman not available on runner; skipping container checks for virida-eve."
          exit 0
        fi

        echo "Using: $(docker --version 2>/dev/null || true)"

        # Locate compose file (root or docker/ subdir)
        COMPOSE_FILE=""
        for f in docker-compose.yml docker-compose.yaml compose.yml compose.yaml \
                 docker/docker-compose.yml docker/docker-compose.yaml docker/compose.yml docker/compose.yaml; do
          if [ -f "$f" ]; then COMPOSE_FILE="$f"; break; fi
        done
        if [ -n "$COMPOSE_FILE" ]; then
          echo "[OK] Compose file found: $COMPOSE_FILE"
          if command -v podman-compose >/dev/null 2>&1; then
            podman-compose -f "$COMPOSE_FILE" config >/dev/null || echo "::warning::podman-compose config failed"
          elif docker compose version >/dev/null 2>&1; then
            docker compose -f "$COMPOSE_FILE" config >/dev/null || echo "::warning::docker compose config failed"
          else
            echo "::warning::No compose tool available; skipping compose validation."
          fi
        else
          echo "[INFO] No compose file found."
        fi

        # Dockerfile + build context presence checks (light validation)
        DOCKERFILE=""
        BUILD_CONTEXT="."
        if [ -f "Dockerfile" ]; then
          DOCKERFILE="Dockerfile"
        elif [ -f "docker/Dockerfile" ]; then
          DOCKERFILE="docker/Dockerfile"
          BUILD_CONTEXT="docker"
        fi
        if [ -n "$DOCKERFILE" ]; then
          echo "[OK] Dockerfile found: $DOCKERFILE"
          if [ ! -d "$BUILD_CONTEXT" ]; then
            echo "::error::Build context directory missing: $BUILD_CONTEXT"
            exit 1
          fi
          echo "[OK] Build context found: $BUILD_CONTEXT"
        else
          echo "::warning::No Dockerfile found; skipping container build."
          exit 0
        fi

        # Hadolint (best-effort): validates Dockerfile syntax and common issues.
        # We keep this non-blocking on runners where hadolint isn't available.
        if command -v hadolint >/dev/null 2>&1; then
          echo "[OK] Running hadolint on $DOCKERFILE"
          hadolint "$DOCKERFILE" || echo "::warning::hadolint reported issues"
        else
          echo "::warning::hadolint not installed on runner; skipping Dockerfile lint."
        fi

        if [ -n "$DOCKERFILE" ]; then
          echo "[OK] Trying container build from $DOCKERFILE (context=$BUILD_CONTEXT)..."
          # Podman rootless needs user namespaces (CLONE_NEWUSER) which are
          # blocked on Clever Cloud PaaS. We try the build but don't fail CI
          # if the sandbox forbids re-exec.
          if ! docker build -f "$DOCKERFILE" -t "virida-eve:ci" "$BUILD_CONTEXT" 2>/tmp/build.err; then
            if grep -qiE 'operation not permitted|cannot re-exec|CLONE_NEWUSER|user namespace' /tmp/build.err 2>/dev/null; then
              echo "::warning::Container build skipped: runner sandbox forbids user namespaces (rootless Podman limitation on PaaS)."
              echo "::warning::Dockerfile/context checks passed; full build cannot run on this runner."
              echo "[DEBUG] --- build.err (head) ---"
              head -n 20 /tmp/build.err || true
            else
              echo "::error::Container build failed for a non-sandbox reason:"
              cat /tmp/build.err
              exit 1
            fi
          fi
        else
          echo "::warning::No Dockerfile found; skipping container build."
        fi

    - name: RAG benchmark (if present)
      working-directory: virida_eve
      run: |
        set -euo pipefail
        if ! command -v python3 >/dev/null 2>&1; then
          echo "::warning::python3 not available; skipping RAG benchmark."
          exit 0
        fi

        # Heuristic: run a benchmark script if the repo provides one.
        # We keep this best-effort (won't fail CI if optional benchmark is missing).
        if [ -f "benchmark/run_benchmark.py" ]; then
          python3 benchmark/run_benchmark.py || echo "::warning::RAG benchmark failed"
        elif [ -f "benchmarks/run.py" ]; then
          python3 benchmarks/run.py || echo "::warning::RAG benchmark failed"
        elif [ -f "rag/benchmark.py" ]; then
          python3 rag/benchmark.py || echo "::warning::RAG benchmark failed"
        else
          echo "[INFO] No benchmark entrypoint found; skipping."
        fi

    - name: Build & push virida-eve image (optional)
      working-directory: virida_eve
      env:
        EVE_IMAGE_PUSH_ENABLED: ${{ secrets.EVE_IMAGE_PUSH_ENABLED }}
        EVE_REGISTRY: ${{ secrets.EVE_REGISTRY }}
        EVE_IMAGE_NAME: ${{ secrets.EVE_IMAGE_NAME }}
        EVE_REGISTRY_USERNAME: ${{ secrets.EVE_REGISTRY_USERNAME }}
        EVE_REGISTRY_PASSWORD: ${{ secrets.EVE_REGISTRY_PASSWORD }}
      run: |
        set -euo pipefail
        if [ "${EVE_IMAGE_PUSH_ENABLED:-}" != "true" ]; then
          echo "[INFO] Image push disabled (set secret EVE_IMAGE_PUSH_ENABLED=true to enable)."
          exit 0
        fi

        # All checks below degrade to warnings. This keeps the job green on
        # constrained runners (Clever Cloud rootless Podman) while still
        # attempting a real build+push whenever the environment supports it.

        missing=()
        [ -z "${EVE_REGISTRY:-}" ]          && missing+=("EVE_REGISTRY")
        [ -z "${EVE_IMAGE_NAME:-}" ]        && missing+=("EVE_IMAGE_NAME")
        [ -z "${EVE_REGISTRY_USERNAME:-}" ] && missing+=("EVE_REGISTRY_USERNAME")
        [ -z "${EVE_REGISTRY_PASSWORD:-}" ] && missing+=("EVE_REGISTRY_PASSWORD")
        if [ ${#missing[@]} -gt 0 ]; then
          echo "::warning::Image push skipped — missing secrets: ${missing[*]}"
          echo "::warning::Add them in Gitea Actions secrets or unset EVE_IMAGE_PUSH_ENABLED to silence this."
          exit 0
        fi
        if ! command -v docker >/dev/null 2>&1; then
          echo "::warning::docker/podman CLI not available on runner; skipping image push."
          exit 0
        fi

        DOCKERFILE=""
        BUILD_CONTEXT="."
        if [ -f "Dockerfile" ]; then
          DOCKERFILE="Dockerfile"
        elif [ -f "docker/Dockerfile" ]; then
          DOCKERFILE="docker/Dockerfile"
          BUILD_CONTEXT="docker"
        else
          echo "::warning::No Dockerfile found; skipping image push."
          exit 0
        fi

        IMAGE_TAG="${EVE_REGISTRY}/${EVE_IMAGE_NAME}:${GITHUB_SHA}"
        echo "${EVE_REGISTRY_PASSWORD}" | docker login "${EVE_REGISTRY}" -u "${EVE_REGISTRY_USERNAME}" --password-stdin || {
          echo "::warning::Registry login failed — check EVE_REGISTRY_USERNAME / EVE_REGISTRY_PASSWORD."
          exit 0
        }

        # The build may fail on PaaS runners without user namespaces
        # (rootless Podman limitation). Degrade gracefully as with the sanity
        # check step above.
        if ! docker build -f "$DOCKERFILE" -t "${IMAGE_TAG}" "$BUILD_CONTEXT" 2>/tmp/build_push.err; then
          if grep -qiE 'operation not permitted|cannot re-exec|CLONE_NEWUSER|user namespace' /tmp/build_push.err 2>/dev/null; then
            echo "::warning::Image build skipped: runner sandbox forbids user namespaces (rootless Podman limitation on PaaS)."
            head -n 10 /tmp/build_push.err || true
            exit 0
          fi
          echo "::error::Image build failed for a non-sandbox reason:"
          cat /tmp/build_push.err
          exit 1
        fi
        docker push "${IMAGE_TAG}"
        echo "[OK] Pushed ${IMAGE_TAG}"


  # ========================================
  # TESTS LEAFNODE (leafnode - Rust) [external repo]
  # ========================================
  test-leafnode:
    runs-on: virida-host
    name: Test Leafnode (leafnode)
    needs: [validate]
    env:
      STRICT_EXTERNAL_CHECKS: ${{ secrets.STRICT_EXTERNAL_CHECKS || 'true' }}

    steps:
    - name: Checkout leafnode
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: Virida/leafnode
        ref: ${{ env.LEAFNODE_REF }}
        path: leafnode
        token: ${{ secrets.GITEA }}

    - name: Cache Rust and ESP toolchains
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: |
          ~/.cargo/bin
          ~/.cargo/registry
          ~/.cargo/git
          ~/.rustup
          ~/.espressif
        key: leafnode-toolchain-${{ runner.os }}-${{ hashFiles('leafnode/**/Cargo.lock', 'leafnode/**/rust-toolchain.toml') }}
        restore-keys: |
          leafnode-toolchain-${{ runner.os }}-

    - name: Rust checks (cargo check + clippy)
      working-directory: leafnode
      env:
        LEAFNODE_FULL_BUILD: ${{ secrets.LEAFNODE_FULL_BUILD }}
      run: |
        set -euo pipefail

        # Locate Cargo.toml (root or known subfolders)
        CARGO_DIR=""
        for d in . firmware/leafnode firmware server tools; do
          if [ -f "$d/Cargo.toml" ]; then CARGO_DIR="$d"; break; fi
        done
        if [ -z "$CARGO_DIR" ]; then
          if [ "${STRICT_EXTERNAL_CHECKS}" = "true" ]; then
            echo "::error::No Cargo.toml found; strict external checks enabled."
            exit 1
          fi
          echo "::warning::No Cargo.toml found; skipping leafnode checks."
          exit 0
        fi
        echo "[OK] Found Rust project at: $CARGO_DIR"

        # Sanity check the manifest (presence of [package] + name/version).
        MANIFEST="$CARGO_DIR/Cargo.toml"
        if ! grep -qE '^\[package\]' "$MANIFEST"; then
          echo "::error::Cargo.toml missing [package] section at $MANIFEST"
          exit 1
        fi
        name=$(awk -F'"' '/^name[[:space:]]*=/{print $2; exit}' "$MANIFEST" || true)
        version=$(awk -F'"' '/^version[[:space:]]*=/{print $2; exit}' "$MANIFEST" || true)
        edition=$(awk -F'"' '/^edition[[:space:]]*=/{print $2; exit}' "$MANIFEST" || true)
        echo "[OK] Cargo.toml structure OK. name=${name:-?} version=${version:-?} edition=${edition:-?}"

        # Detect ESP-IDF toolchain requirement and gate the heavy build.
        NEEDS_ESP="false"
        if [ -f "$CARGO_DIR/rust-toolchain.toml" ] && grep -q 'channel *= *"esp"' "$CARGO_DIR/rust-toolchain.toml"; then
          NEEDS_ESP="true"
        elif grep -qi 'esp-idf-svc\|esp-hal\|esp32' "$CARGO_DIR/Cargo.toml"; then
          NEEDS_ESP="true"
        fi

        if [ "$NEEDS_ESP" = "true" ] && [ "${LEAFNODE_FULL_BUILD:-}" != "true" ]; then
          if [ "${STRICT_EXTERNAL_CHECKS}" = "true" ]; then
            echo "::error::leafnode requires ESP toolchain and LEAFNODE_FULL_BUILD is not enabled."
            exit 1
          fi
          echo "::warning::leafnode targets ESP32 (toolchain=esp, esp-idf-svc). Full cargo check/clippy requires espup + ESP-IDF framework (~2GB, ~15min setup)."
          echo "::warning::Skipping compile checks. Set secret LEAFNODE_FULL_BUILD=true to enable them on this runner."
          echo "[INFO] Manifest + TOML syntax validation passed — project structure looks OK."
          exit 0
        fi

        if ! command -v cargo >/dev/null 2>&1; then
          if [ "${STRICT_EXTERNAL_CHECKS}" = "true" ]; then
            echo "::error::cargo not available on runner; strict external checks enabled."
            exit 1
          fi
          echo "::warning::cargo not available on runner; skipping leafnode compile checks."
          exit 0
        fi

        cd "$CARGO_DIR"
        if [ "$NEEDS_ESP" = "true" ]; then
          echo "[INFO] LEAFNODE_FULL_BUILD=true: installing espup toolchain (this is slow)..."
          if ! command -v espup >/dev/null 2>&1; then
            cargo install espup --locked
          fi
          espup install
          # shellcheck disable=SC1091
          [ -f "$HOME/export-esp.sh" ] && . "$HOME/export-esp.sh"
        fi

        cargo check
        if rustup component list --installed 2>/dev/null | grep -q clippy; then
          cargo clippy -- -D warnings
        else
          if [ "${STRICT_EXTERNAL_CHECKS}" = "true" ]; then
            echo "::error::clippy not installed; strict external checks enabled."
            exit 1
          fi
          echo "::warning::clippy not installed; skipping static analysis."
        fi

  # ========================================
  # TESTS TOUCH IHM (virida_touch_ihm - Node/React) [external repo]
  # ========================================
  test-touch-ihm:
    runs-on: virida-host
    name: Test Touch IHM (virida_touch_ihm)
    needs: [validate]
    env:
      STRICT_EXTERNAL_CHECKS: ${{ secrets.STRICT_EXTERNAL_CHECKS || 'true' }}

    steps:
    # virida_touch_ihm is expected to use main as operational branch.
    - name: Checkout virida_touch_ihm
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: Virida/virida_touch_ihm
        ref: ${{ env.VIRIDA_TOUCH_IHM_REF }}
        path: virida_touch_ihm
        token: ${{ secrets.GITEA }}

    - &setup_node_step
      name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        cache-dependency-path: |
          virida_api/package-lock.json
          virida_app/package-lock.json
          virida_touch_ihm/package-lock.json

    - name: Install + lint/build (if present)
      working-directory: virida_touch_ihm
      run: |
        set -euo pipefail
        if [ ! -f "package.json" ]; then
          if [ "${STRICT_EXTERNAL_CHECKS}" = "true" ]; then
            echo "::error::No package.json found for virida_touch_ihm; strict external checks enabled."
            exit 1
          fi
          echo "::warning::No package.json found; skipping virida_touch_ihm."
          exit 0
        fi
        if npm ci --include=dev --ignore-scripts; then
          echo "[OK] npm ci"
        else
          echo "::error::npm ci failed (lockfile mismatch or registry issue)."
          exit 1
        fi
        if npm run -s lint; then
          echo "[OK] lint"
        else
          if [ "${STRICT_EXTERNAL_CHECKS}" = "true" ]; then
            echo "::error::Lint failed for virida_touch_ihm; strict external checks enabled."
            exit 1
          fi
          echo "::warning::No lint script (or lint failed)"
        fi

        # Advisory build only: do not fail CI if this external repo build is
        # killed by runner limits (OOM/SIGTERM) or exceeds a soft timeout.
        export NODE_OPTIONS="${NODE_OPTIONS:-} --max-old-space-size=1024 --no-warnings"
        if command -v timeout >/dev/null 2>&1; then
          timeout 12m npm run -s build || BUILD_RC=$?
        else
          npm run -s build || BUILD_RC=$?
        fi
        BUILD_RC="${BUILD_RC:-0}"
        if [ "$BUILD_RC" -eq 0 ]; then
          echo "[OK] virida_touch_ihm build"
        elif [ "$BUILD_RC" -eq 124 ]; then
          if [ "${STRICT_EXTERNAL_CHECKS}" = "true" ]; then
            echo "::error::virida_touch_ihm build timed out; strict external checks enabled."
            exit 1
          fi
          echo "::warning::virida_touch_ihm build timed out (advisory step)"
        elif [ "$BUILD_RC" -eq 137 ] || [ "$BUILD_RC" -eq 143 ]; then
          if [ "${STRICT_EXTERNAL_CHECKS}" = "true" ]; then
            echo "::error::virida_touch_ihm build terminated (OOM/limits); strict external checks enabled."
            exit 1
          fi
          echo "::warning::virida_touch_ihm build terminated (likely OOM/runner limits, advisory step)"
        else
          if [ "${STRICT_EXTERNAL_CHECKS}" = "true" ]; then
            echo "::error::virida_touch_ihm build failed with exit code $BUILD_RC; strict external checks enabled."
            exit 1
          fi
          echo "::warning::virida_touch_ihm build failed with exit code $BUILD_RC (advisory step)"
        fi

  # ========================================
  # TESTS FRONTEND (virida_app)
  # ========================================
  test-frontend:
    runs-on: virida-host
    name: Test Frontend (virida_app)
    
    steps:
    - *checkout_code_step
    - *checkout_virida_api_step
    - *checkout_virida_app_step
      
    - *setup_node_step

    - &frontend_npm_ci_step
      name: Install frontend dependencies
      working-directory: virida_app
      run: |
        set -euo pipefail
        if [ ! -f "package.json" ]; then
          echo "::error::Missing virida_app/package.json. Frontend checks cannot run."
          exit 1
        fi
        # Keep devDependencies available even on runners forcing production installs.
        npm ci --include=dev --production=false --ignore-scripts
      
    - name: Lint code
      working-directory: virida_app
      run: |
        set -euo pipefail
        TMP_LOG="$(mktemp)"
        set +e
        npm run -s lint 2>&1 | tee "${TMP_LOG}"
        RC=${PIPESTATUS[0]}
        set -e
        if [ "${RC}" -eq 0 ]; then
          rm -f "${TMP_LOG}"
          exit 0
        fi
        if grep -q "Invalid option '--ext'" "${TMP_LOG}" || grep -q "eslint.config.js" "${TMP_LOG}"; then
          TARGET="."
          if [ -d "src" ]; then TARGET="src"; fi
          if grep -q "Cannot find package 'typescript-eslint'" "${TMP_LOG}"; then
            echo "::warning::Missing typescript-eslint on runner; installing lint-only dependencies before retry."
            npm install --no-save --include=dev typescript-eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin
          fi
          echo "::warning::Detected ESLint flat-config CLI incompatibility in npm lint script; retrying with direct eslint ${TARGET}."
          npx eslint "${TARGET}"
          rm -f "${TMP_LOG}"
          exit 0
        fi
        echo "::error::Lint failed with an unexpected error."
        rm -f "${TMP_LOG}"
        exit "${RC}"

    - name: Run tests
      working-directory: virida_app
      run: npm test

    - name: Build
      working-directory: virida_app
      timeout-minutes: 15
      env:
        NODE_OPTIONS: --max-old-space-size=1024 --no-warnings
        VITE_API_URL: ${{ secrets.VITE_API_URL || '' }}
      run: npm run build

  # ========================================
  # TESTS BACKEND (virida_api)
  # ========================================
  test-backend:
    runs-on: virida-host
    name: Test Backend (virida_api)
    
    steps:
    - *checkout_code_step
    - *checkout_virida_api_step
    - *checkout_virida_app_step
      
    - *setup_node_step

    - &backend_prepare_step
      name: Install backend dependencies + prisma generate
      run: |
        set -euo pipefail
        if [ ! -f "virida_api/package.json" ]; then
          echo "::error::Missing virida_api/package.json. Backend checks cannot run."
          exit 1
        fi
        cd virida_api
        npm ci --include=dev
        export DATABASE_URL="postgresql://user:pass@localhost:5432/virida?schema=public"
        npx prisma generate

    - name: Enforce real backend quality scripts
      working-directory: virida_api
      run: |
        set -euo pipefail
        if grep -Eq '"test"[[:space:]]*:[[:space:]]*"echo[[:space:]]+\\"Tests à implémenter\\"' package.json; then
          echo "::error::Backend test script is still a placeholder."
          exit 1
        fi
        if grep -Eq '"lint"[[:space:]]*:[[:space:]]*"echo[[:space:]]+\\"Linting à implémenter\\"' package.json; then
          echo "::error::Backend lint script is still a placeholder."
          exit 1
        fi
        echo "[OK] Backend quality scripts are not placeholders."
      
    - name: Lint code
      working-directory: virida_api
      run: |
        set -euo pipefail
        TMP_LOG="$(mktemp)"
        set +e
        npm run -s lint 2>&1 | tee "${TMP_LOG}"
        RC=${PIPESTATUS[0]}
        set -e
        if [ "${RC}" -eq 0 ]; then
          rm -f "${TMP_LOG}"
          exit 0
        fi
        if grep -q "Invalid option '--ext'" "${TMP_LOG}" || grep -q "eslint.config.js" "${TMP_LOG}"; then
          TARGET="."
          if [ -d "src" ]; then TARGET="src"; fi
          echo "::warning::Detected ESLint flat-config CLI incompatibility in npm lint script; retrying with direct eslint ${TARGET}."
          npx eslint "${TARGET}"
          rm -f "${TMP_LOG}"
          exit 0
        fi
        echo "::error::Lint failed with an unexpected error."
        rm -f "${TMP_LOG}"
        exit "${RC}"
      
    - name: Run tests
      working-directory: virida_api
      env:
        NODE_OPTIONS: --no-warnings
      run: npm test -- --ci --runInBand
      
    - name: Build test
      working-directory: virida_api
      run: npm run build

  # ========================================
  # SECURITY SCAN
  # ========================================
  security:
    runs-on: virida-host
    name: Security Scan
    needs: [validate]
    
    steps:
    - *checkout_code_step
    - *checkout_virida_api_step
    - *checkout_virida_app_step
      
    - *setup_node_step
        
    - *frontend_npm_ci_step

    - name: Scan Frontend dependencies
      working-directory: virida_app
      run: |
        set -euo pipefail
        if [ ! -f "package.json" ]; then
          echo "::error::Missing virida_app/package.json. Frontend audit cannot run."
          exit 1
        fi
        echo "--- npm audit (blocking on high/critical) ---"
        npm audit --audit-level=high
        
    - &backend_npm_ci_ignore_scripts_step
      name: Install backend dependencies (audit mode)
      working-directory: virida_api
      run: |
        set -euo pipefail
        if [ ! -f "package.json" ]; then
          echo "::error::Missing virida_api/package.json. Backend audit install cannot run."
          exit 1
        fi
        npm ci --ignore-scripts

    - name: Scan Backend dependencies
      working-directory: virida_api
      run: |
        set -euo pipefail
        if [ ! -f "package.json" ]; then
          echo "::error::Missing virida_api/package.json. Backend audit cannot run."
          exit 1
        fi
        echo "--- npm audit (blocking on high/critical) ---"
        npm audit --audit-level=high

    - name: Install gitleaks
      run: |
        set -euo pipefail
        URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
        curl -fsSL "${URL}" -o /tmp/gitleaks.tar.gz
        curl -fsSL "${URL}.sha256" -o /tmp/gitleaks.tar.gz.sha256
        EXPECTED_SHA="$(awk '{print $1}' /tmp/gitleaks.tar.gz.sha256)"
        ACTUAL_SHA="$(shasum -a 256 /tmp/gitleaks.tar.gz | awk '{print $1}')"
        if [ -z "${EXPECTED_SHA}" ] || [ "${ACTUAL_SHA}" != "${EXPECTED_SHA}" ]; then
          echo "::error::gitleaks archive SHA256 mismatch"
          echo "::error::expected=${EXPECTED_SHA}"
          echo "::error::actual=${ACTUAL_SHA}"
          exit 1
        fi
        tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
        chmod +x /tmp/gitleaks
        /tmp/gitleaks version

    - name: Secret scan with gitleaks (blocking)
      run: |
        set -euo pipefail
        /tmp/gitleaks detect --source . --redact --exit-code 1 --config .gitleaks.toml

    - name: Install Trivy CLI
      run: |
        set -euo pipefail
        TRIVY_VERSION="0.64.1"
        URL="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
        curl -fsSL "${URL}" -o /tmp/trivy.tar.gz
        tar -xzf /tmp/trivy.tar.gz -C /tmp trivy
        chmod +x /tmp/trivy
        /tmp/trivy --version

    - name: Trivy filesystem scan (blocking on high/critical)
      run: |
        set -euo pipefail
        /tmp/trivy fs \
          --scanners vuln,secret \
          --severity HIGH,CRITICAL \
          --exit-code 1 \
          --no-progress \
          .

    - name: Trivy IaC scan (blocking on high/critical)
      run: |
        set -euo pipefail
        /tmp/trivy config \
          --severity HIGH,CRITICAL \
          --exit-code 1 \
          --no-progress \
          .

    - name: Trivy container image scan (progressive)
      env:
        TRIVY_IMAGE_SCAN_ENABLED: ${{ secrets.TRIVY_IMAGE_SCAN_ENABLED || 'false' }}
        TRIVY_IMAGE_SCAN_ENFORCE: ${{ secrets.TRIVY_IMAGE_SCAN_ENFORCE || 'false' }}
      run: |
        set -euo pipefail
        if [ "${TRIVY_IMAGE_SCAN_ENABLED}" != "true" ]; then
          echo "[INFO] Image scan disabled (set TRIVY_IMAGE_SCAN_ENABLED=true to enable)."
          exit 0
        fi
        if ! command -v docker >/dev/null 2>&1; then
          if [ "${TRIVY_IMAGE_SCAN_ENFORCE}" = "true" ]; then
            echo "::error::docker CLI missing while image scan is enforced."
            exit 1
          fi
          echo "::warning::docker CLI missing; skipping image scan (progressive mode)."
          exit 0
        fi
        # Lightweight target image from runner base.
        docker pull alpine:3.21 >/dev/null
        /tmp/trivy image --severity HIGH,CRITICAL --exit-code 1 --no-progress alpine:3.21

    - name: Install Semgrep (progressive SAST)
      env:
        SAST_SEMGREP_ENABLED: ${{ secrets.SAST_SEMGREP_ENABLED || 'false' }}
      run: |
        set -euo pipefail
        if [ "${SAST_SEMGREP_ENABLED}" != "true" ]; then
          echo "[INFO] SAST disabled (set SAST_SEMGREP_ENABLED=true to enable)."
          exit 0
        fi
        python3 -m pip install --user --upgrade pip semgrep
        "$HOME/.local/bin/semgrep" --version

    - name: Semgrep SAST scan (progressive)
      env:
        SAST_SEMGREP_ENABLED: ${{ secrets.SAST_SEMGREP_ENABLED || 'false' }}
        SAST_SEMGREP_ENFORCE: ${{ secrets.SAST_SEMGREP_ENFORCE || 'false' }}
      run: |
        set -euo pipefail
        if [ "${SAST_SEMGREP_ENABLED}" != "true" ]; then
          exit 0
        fi
        set +e
        "$HOME/.local/bin/semgrep" --config auto --error --metrics=off .
        RC=$?
        set -e
        if [ "$RC" -eq 0 ]; then
          echo "[OK] Semgrep passed."
          exit 0
        fi
        if [ "${SAST_SEMGREP_ENFORCE}" = "true" ]; then
          echo "::error::Semgrep found blocking issues (enforced mode)."
          exit "$RC"
        fi
        echo "::warning::Semgrep found issues (progressive mode, non-blocking)."

  # ========================================
  # BUILD
  # ========================================
  build:
    runs-on: virida-host
    name: Build All
    needs: [test-frontend, test-backend]
    
    steps:
    - *checkout_code_step
    - *checkout_virida_api_step
    - *checkout_virida_app_step
      
    - *setup_node_step
        
    - *frontend_npm_ci_step

    - name: Build Frontend
      working-directory: virida_app
      timeout-minutes: 20
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL || '' }}
      run: |
        set -euo pipefail
        if [ ! -f "package.json" ]; then
          echo "::error::Missing virida_app/package.json. Frontend build cannot run."
          exit 1
        fi
        NODE_OPTIONS="--max-old-space-size=1536 --no-warnings" npm run build
        echo "[OK] Frontend build successful"
        
    - *backend_prepare_step

    - name: Build Backend
      working-directory: virida_api
      run: |
        set -euo pipefail
        if [ ! -f "package.json" ]; then
          echo "::error::Missing virida_api/package.json. Backend build cannot run."
          exit 1
        fi
        npm run build
        echo "[OK] Backend build successful"

  # ========================================
  # SONARQUBE QUALITY GATE (blocking)
  # ========================================
  sonar-quality-gate:
    runs-on: virida-host
    name: Sonar Quality Gate
    needs: [build]

    steps:
    - name: Validate Sonar gate configuration
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_HARD_GATE_ENABLED: ${{ secrets.SONAR_HARD_GATE_ENABLED || 'true' }}
      run: |
        set -euo pipefail
        if [ "${SONAR_HARD_GATE_ENABLED}" = "false" ]; then
          echo "::error::SONAR_HARD_GATE_ENABLED=false is not allowed on main CI. Quality gate must run."
          exit 1
        fi
        if [ -z "${SONAR_TOKEN:-}" ] || [ -z "${SONAR_HOST_URL:-}" ]; then
          echo "::error::Missing SONAR_TOKEN and/or SONAR_HOST_URL. Quality gate cannot be skipped."
          exit 1
        fi

    - name: Check SonarQube project gates
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      run: |
        set -euo pipefail
        SONAR_TOKEN_CLEAN="$(printf '%s' "${SONAR_TOKEN}" | tr -d '\r\n')"
        SONAR_HOST_URL_CLEAN="$(printf '%s' "${SONAR_HOST_URL}" | tr -d '\r\n' | sed -E 's#(https?://[^/]+).*#\1#')"
        if [ -z "${SONAR_TOKEN_CLEAN}" ]; then
          echo "::error::SONAR_TOKEN empty after trim"
          exit 1
        fi
        check_gate() {
          local key="$1"
          local resp
          local status
          local endpoint="${SONAR_HOST_URL_CLEAN}/api/qualitygates/project_status?projectKey=${key}"
          local body_file
          local http_code
          body_file="$(mktemp)"
          http_code="$(curl -sS -o "${body_file}" -w "%{http_code}" \
            -H "Authorization: Bearer ${SONAR_TOKEN_CLEAN}" \
            "${endpoint}")"
          if [ "${http_code}" = "401" ] || [ "${http_code}" = "403" ]; then
            http_code="$(curl -sS -o "${body_file}" -w "%{http_code}" \
              -u "${SONAR_TOKEN_CLEAN}:" \
              "${endpoint}")"
          fi
          if [ "${http_code}" != "200" ]; then
            echo "::error::Unable to read Sonar quality gate for ${key} (HTTP ${http_code})."
            if [ "${http_code}" = "401" ] || [ "${http_code}" = "403" ]; then
              echo "::error::SONAR_TOKEN is valid for scan upload only, or lacks read access on '${key}'."
              echo "::error::Required Sonar permissions: Execute Analysis + Browse (or project admin) on each project."
            fi
            echo "[DEBUG] endpoint=${endpoint}"
            sed -n '1,120p' "${body_file}"
            rm -f "${body_file}"
            exit 1
          fi
          resp="$(cat "${body_file}")"
          rm -f "${body_file}"
          status="$(echo "$resp" | python3 -c 'import json,sys; print(json.load(sys.stdin)["projectStatus"]["status"])')"
          echo "[INFO] ${key} quality gate: ${status}"
          if [ "${status}" != "OK" ]; then
            echo "::error::Sonar quality gate failed for ${key} (status=${status})."
            exit 1
          fi
        }
        check_gate "virida_api"
        check_gate "virida_app"

  # ========================================
  # SUMMARY
  # ========================================
  ci-summary:
    runs-on: virida-host
    name: CI Summary
    needs: [validate, test-eve, test-leafnode, test-touch-ihm, test-frontend, test-backend, security, build, sonar-quality-gate]
    if: always()
    env:
      STRICT_EXTERNAL_CHECKS: ${{ secrets.STRICT_EXTERNAL_CHECKS || 'true' }}
    
    steps:
    - name: CI Summary
      run: |
        echo "========================================"
        echo "  VIRIDA CI Pipeline Summary"
        echo "========================================"
        echo "Date:   $(date)"
        echo "Branch: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        echo ""

        FAIL=0
        EXT_REQUIRED="false"
        if [ "${STRICT_EXTERNAL_CHECKS}" = "true" ]; then
          EXT_REQUIRED="true"
        fi
        report() {
          local name="$1" result="$2" required="$3"
          case "$result" in
            success)  icon="✅" ;;
            skipped)  icon="⏭️" ;;
            failure)  icon="❌"; [ "$required" = "true" ] && FAIL=1 ;;
            *)        icon="⚠️" ;;
          esac
          printf "  %s  %-25s %s\n" "$icon" "$name" "$result"
        }

        echo "Core jobs:"
        report "Validate"       "${{ needs.validate.result }}"       true
        report "Test Frontend"  "${{ needs.test-frontend.result }}"  true
        report "Test Backend"   "${{ needs.test-backend.result }}"   true
        report "Build"          "${{ needs.build.result }}"          true
        echo ""
        echo "SonarQube:"
        report "Sonar Quality Gate" "${{ needs.sonar-quality-gate.result }}" true
        echo ""
        echo "External repos (best-effort):"
        report "Test EVE"       "${{ needs.test-eve.result }}"       "$EXT_REQUIRED"
        report "Test Leafnode"  "${{ needs.test-leafnode.result }}"  "$EXT_REQUIRED"
        report "Test Touch IHM" "${{ needs.test-touch-ihm.result }}" "$EXT_REQUIRED"
        echo ""
        echo "Security:"
        report "Security Scan"  "${{ needs.security.result }}"      true
        echo ""

        if [ "$FAIL" -eq 0 ]; then
          echo "========================================"
          echo "  ✅ All required CI checks passed!"
          echo "========================================"
          exit 0
        else
          echo "========================================"
          echo "  ❌ Some required CI checks failed"
          echo "========================================"
          exit 1
        fi

  # ========================================
  # METRICS ARTIFACT
  # ========================================
  ci-metrics:
    runs-on: virida-host
    name: CI Metrics Artifact
    needs: [validate, test-eve, test-leafnode, test-touch-ihm, test-frontend, test-backend, security, build, sonar-quality-gate, ci-summary]
    if: always()
    env:
      STRICT_EXTERNAL_CHECKS: ${{ secrets.STRICT_EXTERNAL_CHECKS || 'true' }}

    steps:
    - name: Generate metrics json
      run: |
        set -euo pipefail
        mkdir -p ci-metrics
        cat > ci-metrics/summary.json <<EOF
        {
          "timestamp_utc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
          "workflow": "VIRIDA CI - Main Pipeline",
          "branch": "${{ github.ref_name }}",
          "sha": "${{ github.sha }}",
          "strict_external_checks": "${STRICT_EXTERNAL_CHECKS}",
          "jobs": {
            "validate": "${{ needs.validate.result }}",
            "test_eve": "${{ needs.test-eve.result }}",
            "test_leafnode": "${{ needs.test-leafnode.result }}",
            "test_touch_ihm": "${{ needs.test-touch-ihm.result }}",
            "test_frontend": "${{ needs.test-frontend.result }}",
            "test_backend": "${{ needs.test-backend.result }}",
            "security": "${{ needs.security.result }}",
            "build": "${{ needs.build.result }}",
            "sonar_quality_gate": "${{ needs.sonar-quality-gate.result }}",
            "ci_summary": "${{ needs.ci-summary.result }}"
          }
        }
        EOF
        cp ci-metrics/summary.json ci-metrics/summary-$(date -u +"%Y%m%dT%H%M%SZ").json

    - name: Upload CI metrics artifact
      uses: actions/upload-artifact@ff15f0306b3f739f7b6fd43fb5d26cd321bd4de5 # v3
      with:
        name: ci-metrics-${{ github.run_id }}
        path: ci-metrics/
        retention-days: 30


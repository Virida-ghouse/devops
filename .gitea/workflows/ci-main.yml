  # CD (Clever Cloud) — lives in dedicated workflows:
  #   .gitea/workflows/api-clever-cloud-deploy.yml   → virida_api
  #   .gitea/workflows/app-clever-cloud-deploy.yml   → virida_app
  #   .gitea/workflows/eve-clever-cloud-deploy.yml   → virida-eve (Docker)
  # Gitea, Gitea Runner and SonarQube apps are deployed/managed manually
  # via `clever deploy` since their images ship from this repo's Dockerfiles.

name: Leafnode Firmware Release

# Builds the leafnode ESP32 firmware and publishes a Gitea Release with the
# binary asset whenever a tag matching 'leafnode-v*' is pushed on this repo.
#
# Also triggerable manually via workflow_dispatch (no release created unless
# an explicit tag is provided in the 'tag' input).
#
# Why a separate workflow:
#   - ESP-IDF toolchain (~2 GB, ~15 min install) is too heavy to run on every CI.
#   - Releases are rare; this job only runs on explicit tag pushes.
#
# Required secrets:
#   - GITEA                    (PAT with repo write on leafnode + read on this repo)
#   - GITEA_RELEASE_HOST       (e.g. ssh.gitea.virida.org) — for the Release API
#   - GITEA_RELEASE_OWNER      (e.g. Virida) — owner of the leafnode repo
#   - GITEA_RELEASE_REPO       (e.g. leafnode) — repo name on Gitea
#
# How to release:
#   git tag leafnode-v1.2.3 && git push origin leafnode-v1.2.3

on:
  push:
    tags:
      - 'leafnode-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional tag to publish as Release (leave empty for dry-run build)'
        required: false
        default: ''

concurrency:
  group: leafnode-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: virida-host
    name: Build ESP32 firmware + publish Release
    timeout-minutes: 45
    if: ${{ secrets.GITEA != '' }}

    steps:
    - name: Resolve tag
      id: tag
      run: |
        set -euo pipefail
        TAG=""
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          TAG="${GITHUB_REF#refs/tags/}"
        elif [ -n "${{ github.event.inputs.tag }}" ]; then
          TAG="${{ github.event.inputs.tag }}"
        fi
        echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
        if [ -n "$TAG" ]; then
          if ! printf '%s' "$TAG" | grep -Eq '^leafnode-v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9._-]+)?$'; then
            echo "::error::Invalid tag format: $TAG"
            echo "::error::Expected: leafnode-vX.Y.Z (optional suffix allowed)"
            exit 1
          fi
          echo "[INFO] Release tag: $TAG"
        else
          echo "[INFO] No tag — this is a dry-run build (no Release published)."
        fi

    - name: Checkout leafnode
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: Virida/leafnode
        ref: main
        path: leafnode
        token: ${{ secrets.GITEA }}

    - name: Locate Cargo.toml
      id: locate
      working-directory: leafnode
      run: |
        set -euo pipefail
        CARGO_DIR=""
        for d in . firmware/leafnode firmware server tools; do
          if [ -f "$d/Cargo.toml" ]; then CARGO_DIR="$d"; break; fi
        done
        if [ -z "$CARGO_DIR" ]; then
          echo "::error::No Cargo.toml found — cannot build."
          exit 1
        fi
        echo "cargo_dir=$CARGO_DIR" >> "$GITHUB_OUTPUT"
        echo "[OK] Rust project at: $CARGO_DIR"
        NAME=$(awk -F'"' '/^name[[:space:]]*=/{print $2; exit}' "$CARGO_DIR/Cargo.toml")
        VERSION=$(awk -F'"' '/^version[[:space:]]*=/{print $2; exit}' "$CARGO_DIR/Cargo.toml")
        echo "crate_name=$NAME" >> "$GITHUB_OUTPUT"
        echo "crate_version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Install espup + ESP-IDF toolchain
      working-directory: leafnode
      run: |
        set -euo pipefail
        if ! command -v cargo >/dev/null 2>&1; then
          echo "::error::cargo not available on runner. Install Rust in the runner image."
          exit 1
        fi
        if ! command -v espup >/dev/null 2>&1; then
          echo "[INFO] Installing espup (one-time, ~2 min)..."
          cargo install espup --locked
        fi
        echo "[INFO] Running espup install (ESP-IDF ~15 min first run, cached after)..."
        espup install
        echo "[INFO] Installing espflash (firmware packaging tool)..."
        cargo install espflash --locked || cargo install cargo-espflash --locked || true

    - name: Build firmware (release)
      id: build
      working-directory: leafnode/${{ steps.locate.outputs.cargo_dir }}
      env:
        CRATE_NAME: ${{ steps.locate.outputs.crate_name }}
      run: |
        set -euo pipefail
        # shellcheck disable=SC1091
        [ -f "$HOME/export-esp.sh" ] && . "$HOME/export-esp.sh"

        cargo build --release

        # Locate the built ELF — try common target dirs.
        ELF=""
        for p in \
          "target/xtensa-esp32-espidf/release/${CRATE_NAME}" \
          "target/xtensa-esp32s2-espidf/release/${CRATE_NAME}" \
          "target/xtensa-esp32s3-espidf/release/${CRATE_NAME}" \
          "target/riscv32imc-esp-espidf/release/${CRATE_NAME}" \
          "target/riscv32imac-esp-espidf/release/${CRATE_NAME}" \
          "target/release/${CRATE_NAME}"; do
          if [ -f "$p" ]; then ELF="$p"; break; fi
        done
        if [ -z "$ELF" ]; then
          echo "::error::Built ELF not found for crate ${CRATE_NAME}. Searched common target/ paths."
          find target -maxdepth 3 -type f -name "${CRATE_NAME}*" 2>/dev/null | head -20 || true
          exit 1
        fi
        echo "[OK] ELF: $ELF"

        # Convert ELF to flash-ready .bin image
        OUT="/tmp/${CRATE_NAME}-firmware.bin"
        if command -v espflash >/dev/null 2>&1; then
          espflash save-image --chip esp32 "$ELF" "$OUT" || espflash save-image "$ELF" "$OUT"
        else
          # Fallback: use cargo-espflash
          cargo espflash save-image --chip esp32 "$OUT" || true
        fi

        if [ ! -f "$OUT" ]; then
          echo "::error::Firmware binary not produced at $OUT"
          exit 1
        fi
        SIZE=$(stat -c%s "$OUT" 2>/dev/null || wc -c <"$OUT")
        echo "firmware_path=$OUT" >> "$GITHUB_OUTPUT"
        echo "firmware_size=$SIZE" >> "$GITHUB_OUTPUT"
        echo "[OK] Firmware: $OUT ($SIZE bytes)"

    - name: Upload artifact (always)
      uses: actions/upload-artifact@ff15f0306b3f739f7b6fd43fb5d26cd321bd4de5 # v3
      with:
        name: leafnode-firmware-${{ steps.tag.outputs.tag || github.sha }}
        path: ${{ steps.build.outputs.firmware_path }}
        retention-days: 30

    - name: Create Gitea Release (if tag)
      if: ${{ steps.tag.outputs.tag != '' }}
      env:
        TAG: ${{ steps.tag.outputs.tag }}
        CRATE_NAME: ${{ steps.locate.outputs.crate_name }}
        CRATE_VERSION: ${{ steps.locate.outputs.crate_version }}
        FIRMWARE: ${{ steps.build.outputs.firmware_path }}
        GITEA_TOKEN: ${{ secrets.GITEA }}
        GITEA_HOST: ${{ secrets.GITEA_RELEASE_HOST }}
        GITEA_OWNER: ${{ secrets.GITEA_RELEASE_OWNER }}
        GITEA_REPO: ${{ secrets.GITEA_RELEASE_REPO }}
      run: |
        set -euo pipefail
        : "${GITEA_HOST:?Missing secret GITEA_RELEASE_HOST (e.g. ssh.gitea.virida.org)}"
        : "${GITEA_OWNER:?Missing secret GITEA_RELEASE_OWNER (e.g. Virida)}"
        : "${GITEA_REPO:?Missing secret GITEA_RELEASE_REPO (e.g. leafnode)}"

        API="https://${GITEA_HOST}/api/v1/repos/${GITEA_OWNER}/${GITEA_REPO}"

        BODY="$(python3 - <<'PY'
import json
import os

payload = {
  "tag_name": os.environ["TAG"],
  "name": f'leafnode {os.environ["TAG"]}',
  "body": (
    f'Automated firmware build for {os.environ["CRATE_NAME"]} v{os.environ["CRATE_VERSION"]}.\n\n'
    f'Built from commit {os.environ["GITHUB_SHA"]}.\n\n'
    'Flash with:\n  espflash flash --chip esp32 leafnode-firmware.bin'
  ),
  "draft": False,
  "prerelease": False,
}
print(json.dumps(payload, ensure_ascii=True))
PY
)"

        api_post_json() {
          local url="$1"
          local data="$2"
          local attempt=1
          while [ "$attempt" -le 3 ]; do
            if RESP_TMP=$(curl -fsS -X POST \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$data" \
              "$url" 2>/tmp/release_api.err); then
              printf "%s" "$RESP_TMP"
              return 0
            fi
            echo "::warning::API POST failed (attempt ${attempt}/3), retrying..."
            attempt=$((attempt + 1))
            sleep 2
          done
          echo "::error::API POST failed after retries"
          cat /tmp/release_api.err || true
          return 1
        }

        api_post_file() {
          local url="$1"
          local file="$2"
          local attempt=1
          while [ "$attempt" -le 3 ]; do
            if RESP_TMP=$(curl -fsS -X POST \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -F "attachment=@${file}" \
              "$url" 2>/tmp/release_upload.err); then
              printf "%s" "$RESP_TMP"
              return 0
            fi
            echo "::warning::Asset upload failed (attempt ${attempt}/3), retrying..."
            attempt=$((attempt + 1))
            sleep 2
          done
          echo "::error::Asset upload failed after retries"
          cat /tmp/release_upload.err || true
          return 1
        }

        echo "[INFO] Creating Release $TAG on $API ..."
        RESP="$(api_post_json "${API}/releases" "$BODY")"

        RELEASE_ID=$(echo "$RESP" | python3 -c 'import json,sys; d=json.loads(sys.stdin.read()); print(d.get("id",""))' 2>/dev/null || true)
        if [ -z "$RELEASE_ID" ]; then
          echo "::error::Failed to create Release. API response:"
          echo "$RESP" | head -40
          exit 1
        fi
        echo "[OK] Release created, id=$RELEASE_ID"

        ASSET_NAME="$(basename "$FIRMWARE")"
        echo "[INFO] Uploading asset $ASSET_NAME ..."
        UPLOAD_RESP="$(api_post_file "${API}/releases/${RELEASE_ID}/assets?name=${ASSET_NAME}" "${FIRMWARE}")"
        ASSET_ID=$(echo "$UPLOAD_RESP" | python3 -c 'import json,sys; d=json.loads(sys.stdin.read()); print(d.get("id",""))' 2>/dev/null || true)
        if [ -z "$ASSET_ID" ]; then
          echo "::error::Asset upload response has no id. Response:"
          echo "$UPLOAD_RESP" | head -40
          exit 1
        fi
        echo "$UPLOAD_RESP" | head -20
        echo "[OK] Release published: https://${GITEA_HOST}/${GITEA_OWNER}/${GITEA_REPO}/releases/tag/${TAG}"

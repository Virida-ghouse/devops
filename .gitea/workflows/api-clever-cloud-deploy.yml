name: Deploy virida_api to Clever Cloud

# Deploys the virida_api repository to its existing Clever Cloud app
# (app_ff40e2dd-3bab-4a9b-82c4-8aa517a9a3f6, alias "viridaapi").
#
# One-time setup: add these secrets in Gitea Actions settings of this repo:
#   CLEVER_API_GIT_URL     Usually:
#                            git+ssh://git@push-n3-par-clevercloud-customers.services.clever-cloud.com/app_ff40e2dd-3bab-4a9b-82c4-8aa517a9a3f6.git
#                          (or the https:// equivalent if you use token auth)
#   CLEVER_API_DEPLOY_REF  Usually 'master'
#   CD_API_ENABLED         Set to 'true' to actually deploy (safety switch)
#
# Triggered:
#   - Manually via Gitea Actions UI (workflow_dispatch)
#   - Weekly schedule (Monday 06:00 UTC) as drift correction
#
# Note: for true "push-to-master triggers CC deploy", the ideal is to set
# up this workflow directly in the virida_api repo. This devops-level
# workflow is a convenience wrapper (manual + scheduled).

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print plan but do not push'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: api-clevercloud-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: virida-host
    name: Push virida_api to Clever Cloud
    timeout-minutes: 10
    if: ${{ secrets.GITEA != '' }}

    steps:
    - name: Validate deploy secrets
      env:
        CLEVER_API_GIT_URL: ${{ secrets.CLEVER_API_GIT_URL }}
        CLEVER_API_DEPLOY_REF: ${{ secrets.CLEVER_API_DEPLOY_REF }}
      run: |
        set -euo pipefail
        if [ -z "${CLEVER_API_GIT_URL:-}" ]; then
          echo "::error::Missing secret CLEVER_API_GIT_URL (Clever Cloud git remote for the virida_api app)."
          exit 1
        fi
        if [ -z "${CLEVER_API_DEPLOY_REF:-}" ]; then
          echo "::error::Missing secret CLEVER_API_DEPLOY_REF (usually 'master')."
          exit 1
        fi
        echo "[OK] Deploy secrets present"

    - name: Checkout virida_api
      uses: actions/checkout@v4
      with:
        repository: Virida/virida_api
        path: virida_api
        fetch-depth: 0
        token: ${{ secrets.GITEA }}

    - name: Sanity check repo
      working-directory: virida_api
      run: |
        set -euo pipefail
        if [ ! -f "package.json" ]; then
          echo "::error::package.json missing — Clever Cloud Node.js deploy would fail."
          exit 1
        fi
        echo "[OK] package.json found; HEAD = $(git rev-parse --short HEAD)"

    - name: Push to Clever Cloud
      working-directory: virida_api
      env:
        CLEVER_API_GIT_URL: ${{ secrets.CLEVER_API_GIT_URL }}
        CLEVER_API_DEPLOY_REF: ${{ secrets.CLEVER_API_DEPLOY_REF }}
        DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      run: |
        set -euo pipefail
        git remote remove clevercloud 2>/dev/null || true
        git remote add clevercloud "${CLEVER_API_GIT_URL}"
        if [ "${DRY_RUN}" = "true" ]; then
          echo "[DRY RUN] would push HEAD to clevercloud:${CLEVER_API_DEPLOY_REF}"
          exit 0
        fi
        echo "[INFO] Pushing to Clever Cloud (this triggers a build on their side)..."
        git push --force clevercloud "HEAD:${CLEVER_API_DEPLOY_REF}"
        echo "[OK] Push done — check Clever Cloud Console for build progress."

    - name: Summary
      if: always()
      run: |
        echo "========================================"
        echo "  Deploy virida_api → Clever Cloud"
        echo "========================================"
        echo "Branch pushed: ${{ secrets.CLEVER_API_DEPLOY_REF }}"
        echo "App id:        app_ff40e2dd-3bab-4a9b-82c4-8aa517a9a3f6"
        echo "Console:       https://console.clever-cloud.com"

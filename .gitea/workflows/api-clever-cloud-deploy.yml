name: Deploy virida_api to Clever Cloud

# Deploy virida_api to a standard Clever Cloud app through git push.
# Auto trigger:
#   - push on main (for continuous delivery)
# Manual/safety:
#   - workflow_dispatch with dry_run, confirm_production and rollback_ref
# Drift correction:
#   - weekly schedule

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print plan but do not push'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      confirm_production:
        description: 'Explicit production approval (must be true to deploy manually)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      rollback_ref:
        description: 'Optional git ref/SHA to rollback to (deploy this ref instead of HEAD)'
        required: false
        default: ''
  schedule:
    - cron: '0 1 * * 1'

concurrency:
  group: api-clevercloud-deploy
  cancel-in-progress: false

env:
  VIRIDA_API_REF: ${{ secrets.VIRIDA_API_REF || 'main' }}
  CI_WAIT_ATTEMPTS: '180'
  CI_WAIT_SLEEP_SECONDS: '20'
  REQUIRED_CI_CONTEXT: 'VIRIDA CI - Main Pipeline'

jobs:
  deploy:
    runs-on: virida-host
    name: Push virida_api to Clever Cloud
    environment: production
    timeout-minutes: 12
    if: ${{ secrets.GITEA != '' && secrets.CD_API_ENABLED == 'true' }}

    steps:
    - name: Validate deploy secrets
      env:
        CLEVER_API_GIT_URL: ${{ secrets.CLEVER_API_GIT_URL }}
        CLEVER_API_DEPLOY_REF: ${{ secrets.CLEVER_API_DEPLOY_REF }}
      run: |
        set -euo pipefail
        if [ -z "${CLEVER_API_GIT_URL:-}" ]; then
          echo "::error::Missing secret CLEVER_API_GIT_URL (Clever Cloud git remote for virida_api)."
          exit 1
        fi
        if [ -z "${CLEVER_API_DEPLOY_REF:-}" ]; then
          echo "::error::Missing secret CLEVER_API_DEPLOY_REF (usually 'main')."
          exit 1
        fi
        echo "[OK] Deploy secrets present"

    - name: Explicit deploy approval gate for manual/scheduled runs
      env:
        EVENT_NAME: ${{ github.event_name }}
        CONFIRM_PRODUCTION: ${{ github.event.inputs.confirm_production || 'false' }}
        PROD_AUTO_APPROVED: ${{ secrets.PROD_AUTO_APPROVED || 'false' }}
      run: |
        set -euo pipefail
        if [ "${EVENT_NAME}" = "push" ]; then
          echo "[OK] Push on main: auto-deploy enabled."
          exit 0
        fi
        if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
          if [ "${CONFIRM_PRODUCTION}" != "true" ]; then
            echo "::error::Deployment blocked: set input confirm_production=true."
            exit 1
          fi
          echo "[OK] Manual production approval confirmed."
          exit 0
        fi
        if [ "${PROD_AUTO_APPROVED}" != "true" ]; then
          echo "::error::Scheduled deployment blocked: secret PROD_AUTO_APPROVED must be true."
          exit 1
        fi
        echo "[OK] Scheduled deployment explicitly allowed."

    - name: Auto-deploy strategy gate (API)
      env:
        EVENT_NAME: ${{ github.event_name }}
        CD_API_AUTO_DEPLOY: ${{ secrets.CD_API_AUTO_DEPLOY || 'true' }}
      run: |
        set -euo pipefail
        if [ "${EVENT_NAME}" != "push" ]; then
          echo "[OK] Not a push event: strategy gate passed."
          exit 0
        fi
        if [ "${CD_API_AUTO_DEPLOY}" != "true" ]; then
          echo "::error::Auto-deploy on push is disabled for virida_api (set CD_API_AUTO_DEPLOY=true to enable)."
          exit 1
        fi
        echo "[OK] Auto-deploy on push enabled for virida_api."

    - name: Gate on CI main success for current SHA
      if: ${{ github.event_name == 'push' }}
      env:
        GITEA_TOKEN: ${{ secrets.GITEA }}
        REPO: ${{ github.repository }}
        SHA: ${{ github.sha }}
        SERVER_URL: ${{ github.server_url }}
        CI_WAIT_ATTEMPTS: ${{ env.CI_WAIT_ATTEMPTS }}
        CI_WAIT_SLEEP_SECONDS: ${{ env.CI_WAIT_SLEEP_SECONDS }}
        REQUIRED_CI_CONTEXT: ${{ env.REQUIRED_CI_CONTEXT }}
      run: |
        set -euo pipefail
        API="${SERVER_URL}/api/v1/repos/${REPO}/commits/${SHA}/status"
        echo "[INFO] Waiting for CI success on commit ${SHA} (context='${REQUIRED_CI_CONTEXT}')..."
        for i in $(seq 1 "${CI_WAIT_ATTEMPTS}"); do
          RESP="$(curl -fsS -H "Authorization: token ${GITEA_TOKEN}" "${API}")"
          STATE="$(echo "${RESP}" | python3 -c 'import json,sys; d=json.load(sys.stdin); print((d.get("state") or "").lower())')"
          CTX_STATE="$(echo "${RESP}" | python3 -c 'import json,sys; d=json.load(sys.stdin); target=sys.argv[1].strip().lower(); statuses=d.get("statuses") or []; m=[(s.get("context") or "", (s.get("state") or "").lower()) for s in statuses if (s.get("context") or "").strip().lower()==target]; print(m[0][1] if m else "")' "${REQUIRED_CI_CONTEXT}")"
          echo "[INFO] Attempt ${i}/${CI_WAIT_ATTEMPTS}, global=${STATE:-unknown}, context=${CTX_STATE:-missing}"
          case "${STATE}" in
            success)
              if [ -n "${CTX_STATE}" ] && [ "${CTX_STATE}" != "success" ]; then
                echo "[INFO] Global success reached but required context is '${CTX_STATE}', waiting..."
                sleep "${CI_WAIT_SLEEP_SECONDS}"
                continue
              fi
              echo "[OK] Commit status is success. Deploy can continue."
              exit 0
              ;;
            failure|error)
              echo "::error::CI checks failed for commit ${SHA}. Deployment blocked."
              exit 1
              ;;
            pending|"")
              sleep "${CI_WAIT_SLEEP_SECONDS}"
              ;;
            *)
              echo "[INFO] Non-final status '${STATE}', waiting..."
              sleep "${CI_WAIT_SLEEP_SECONDS}"
              ;;
          esac
        done
        echo "::error::Timed out while waiting for CI success on ${SHA}."
        exit 1

    - name: Checkout virida_api
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: Virida/virida_api
        ref: ${{ github.event_name == 'push' && github.sha || env.VIRIDA_API_REF }}
        path: virida_api
        fetch-depth: 0
        token: ${{ secrets.GITEA }}

    - name: Push to Clever Cloud
      working-directory: virida_api
      env:
        CLEVER_API_GIT_URL: ${{ secrets.CLEVER_API_GIT_URL }}
        CLEVER_API_DEPLOY_REF: ${{ secrets.CLEVER_API_DEPLOY_REF }}
        DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        ROLLBACK_REF: ${{ github.event.inputs.rollback_ref || '' }}
      run: |
        set -euo pipefail
        case "${CLEVER_API_DEPLOY_REF}" in
          main|release/*|hotfix/*) ;;
          *)
            echo "::error::Ref de deploiement non autorisee: ${CLEVER_API_DEPLOY_REF}"
            echo "::error::Valeurs autorisees: main, release/*, hotfix/*"
            exit 1
            ;;
        esac

        PREV_REMOTE_SHA="$(git ls-remote "${CLEVER_API_GIT_URL}" "refs/heads/${CLEVER_API_DEPLOY_REF}" | awk '{print $1}')"
        if [ -n "${PREV_REMOTE_SHA:-}" ]; then
          echo "[INFO] Previous remote SHA on ${CLEVER_API_DEPLOY_REF}: ${PREV_REMOTE_SHA}"
          echo "[INFO] Rollback command:"
          echo "       git push clevercloud ${PREV_REMOTE_SHA}:${CLEVER_API_DEPLOY_REF}"
        fi

        SOURCE_REF="HEAD"
        if [ -n "${ROLLBACK_REF}" ]; then
          if ! git rev-parse --verify --quiet "${ROLLBACK_REF}^{commit}" >/dev/null; then
            echo "::error::rollback_ref not found or not a commit-ish: ${ROLLBACK_REF}"
            exit 1
          fi
          SOURCE_REF="${ROLLBACK_REF}"
          echo "[INFO] Rollback mode: deploying ${SOURCE_REF} to ${CLEVER_API_DEPLOY_REF}"
        fi

        git remote remove clevercloud 2>/dev/null || true
        git remote add clevercloud "${CLEVER_API_GIT_URL}"
        if [ "${DRY_RUN}" = "true" ]; then
          echo "[DRY RUN] would push ${SOURCE_REF} to clevercloud:${CLEVER_API_DEPLOY_REF}"
          exit 0
        fi
        git push clevercloud "${SOURCE_REF}:${CLEVER_API_DEPLOY_REF}"
        echo "[OK] Push done — check Clever Cloud Console for build progress."

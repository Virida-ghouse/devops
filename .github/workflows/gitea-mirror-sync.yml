name: Sync Gitea mirror

# Calls Gitea's mirror-sync API as soon as GitHub receives a push,
# so the Gitea runner picks up new commits without waiting for the
# default 10 min mirror interval.
#
# Secrets required on this GitHub repository:
#   - GITEA_MIRROR_TOKEN : a Gitea access token with repo:write scope
#                          (token owner must be allowed to sync the mirror).
#
# Defaults to syncing the current repo's counterpart under
# gitea.virida.org/Virida/<repo>. Override with GITEA_HOST / GITEA_OWNER /
# GITEA_REPO env/secrets if the layout differs.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Gitea repo to sync (owner/name). Defaults to this repo."
        required: false
        default: ""

concurrency:
  group: gitea-mirror-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger Gitea mirror-sync
        env:
          GITEA_HOST: ${{ vars.GITEA_HOST || 'gitea.virida.org' }}
          GITEA_OWNER: ${{ vars.GITEA_OWNER || 'Virida' }}
          GITEA_TOKEN: ${{ secrets.GITEA_MIRROR_TOKEN }}
          DISPATCH_TARGET: ${{ github.event.inputs.target_repo }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          if [ -z "${GITEA_TOKEN:-}" ]; then
            echo "::error::Missing GITEA_MIRROR_TOKEN secret on this repository."
            exit 1
          fi

          if [ -n "${DISPATCH_TARGET:-}" ]; then
            OWNER="${DISPATCH_TARGET%%/*}"
            REPO="${DISPATCH_TARGET##*/}"
            if [ -z "${OWNER}" ] || [ -z "${REPO}" ] || [ "${OWNER}" = "${DISPATCH_TARGET}" ]; then
              echo "::error::target_repo must look like owner/name (got '${DISPATCH_TARGET}')."
              exit 1
            fi
          else
            OWNER="${GITEA_OWNER}"
            REPO="${GITHUB_REPO_NAME}"
          fi

          ENDPOINT="https://${GITEA_HOST}/api/v1/repos/${OWNER}/${REPO}/mirror-sync"
          echo "[INFO] POST ${ENDPOINT}"

          HTTP_CODE="$(curl -sS -o /tmp/gitea-sync.body -w '%{http_code}' \
            -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H 'Accept: application/json' \
            "${ENDPOINT}")"

          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::Gitea mirror-sync failed (HTTP ${HTTP_CODE})"
            sed -n '1,120p' /tmp/gitea-sync.body || true
            exit 1
          fi

          echo "[OK] Mirror sync triggered for ${OWNER}/${REPO}"
